<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Inventario — GestorBK</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <!-- ═══════════════════════════════════════════════════════════
       SCREEN: LOGIN
  ════════════════════════════════════════════════════════════ -->
  <div id="screen-login" class="screen active">
    <div class="login-wrap">
      <div class="login-logo">
        <div class="login-icon">
          <svg viewBox="0 0 48 48" fill="none"><rect x="4" y="8" width="40" height="32" rx="4" fill="#CF4520"/><rect x="10" y="16" width="28" height="3" rx="1.5" fill="#fff" opacity=".9"/><rect x="10" y="23" width="20" height="3" rx="1.5" fill="#fff" opacity=".7"/><rect x="10" y="30" width="14" height="3" rx="1.5" fill="#fff" opacity=".5"/></svg>
        </div>
        <h1>Inventario</h1>
        <p>GestorBK</p>
      </div>
      <form id="form-login" autocomplete="on" novalidate>
        <div class="field-group">
          <label for="login-username">Usuario</label>
          <input id="login-username" type="text" name="username"
                 autocomplete="username" autocapitalize="none"
                 placeholder="nombre de usuario" required>
        </div>
        <div class="field-group">
          <label for="login-password">Contraseña</label>
          <input id="login-password" type="password" name="password"
                 autocomplete="current-password"
                 placeholder="••••••••" required>
        </div>
        <p id="login-error" class="msg-error" hidden></p>
        <button type="submit" class="btn btn-primary btn-full btn-lg" id="btn-login">
          Ingresar
        </button>
      </form>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════
       SCREEN: HOME
  ════════════════════════════════════════════════════════════ -->
  <div id="screen-home" class="screen">
    <header class="app-header">
      <div class="header-title">
        <span class="header-label">INVENTARIO</span>
        <span class="header-sub">Seguimiento diurno y nocturno</span>
      </div>
      <button id="btn-logout" class="btn-icon" aria-label="Cerrar sesión">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </header>
    <div class="home-body">
      <p class="home-greeting">Hola, <strong id="home-username"></strong></p>
      <div class="home-actions">
        <button id="btn-go-add" class="action-card">
          <div class="action-icon action-icon--add">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </div>
          <span class="action-label">Añadir</span>
          <span class="action-desc">Registrar inventario</span>
        </button>
        <button id="btn-go-search" class="action-card" id="card-search">
          <div class="action-icon action-icon--search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </div>
          <span class="action-label">Buscar</span>
          <span class="action-desc">Ver registros anteriores</span>
        </button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════
       SCREEN: ADD (Inventory Form)
  ════════════════════════════════════════════════════════════ -->
  <div id="screen-add" class="screen">
    <header class="app-header">
      <button id="btn-back-add" class="btn-back" aria-label="Volver">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="header-title">
        <span class="header-label">AÑADIR</span>
        <span class="header-sub">Nuevo inventario</span>
      </div>
    </header>

    <div class="form-scroll">
      <!-- Info del usuario + fecha -->
      <div class="form-card">
        <div class="field-group">
          <label>Nombre</label>
          <div id="add-user-name" class="user-name-display"></div>
        </div>

        <!-- Fecha -->
        <div class="field-group">
          <label for="add-date">Fecha</label>
          <input id="add-date" type="date">
        </div>

        <!-- Momento -->
        <div class="field-group">
          <label>Momento del Inventario</label>
          <div class="toggle-group" role="group">
            <button type="button" class="toggle-btn active" data-moment="cierre">Cierre</button>
            <button type="button" class="toggle-btn" data-moment="apertura">Apertura</button>
          </div>
          <div id="apertura-notice" class="apertura-notice" hidden></div>
        </div>
      </div>

      <!-- Product rows rendered by JS -->
      <div id="products-list"></div>

      <div class="form-footer">
        <p id="add-error" class="msg-error" hidden></p>
        <button id="btn-submit-add" class="btn btn-primary btn-full btn-lg">
          Enviar Inventario
        </button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════
       SCREEN: SEARCH
  ════════════════════════════════════════════════════════════ -->
  <div id="screen-search" class="screen">
    <header class="app-header">
      <button id="btn-back-search" class="btn-back" aria-label="Volver">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="header-title">
        <span class="header-label">BUSCAR</span>
        <span class="header-sub">Registros de inventario</span>
      </div>
    </header>

    <div class="form-scroll">
      <div class="form-card search-filters">
        <div class="filter-row">
          <div class="field-group flex-1">
            <label for="search-date">Fecha</label>
            <input id="search-date" type="date">
          </div>
          <div class="field-group flex-1">
            <label for="search-moment">Momento</label>
            <select id="search-moment">
              <option value="">Todos</option>
              <option value="apertura">Apertura</option>
              <option value="cierre">Cierre</option>
            </select>
          </div>
        </div>
        <button id="btn-search" class="btn btn-primary btn-full">Buscar</button>
      </div>

      <div id="search-results"></div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════
       SCREEN: DETAIL
  ════════════════════════════════════════════════════════════ -->
  <div id="screen-detail" class="screen">
    <header class="app-header">
      <button id="btn-back-detail" class="btn-back" aria-label="Volver">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="header-title">
        <span class="header-label">DETALLE</span>
        <span class="header-sub" id="detail-subtitle"></span>
      </div>
    </header>
    <div id="detail-content" class="form-scroll"></div>
  </div>

</div><!-- #app -->

<!-- Toast notification -->
<div id="toast" class="toast" hidden></div>

<script src="app.js"></script>
</body>
</html>
