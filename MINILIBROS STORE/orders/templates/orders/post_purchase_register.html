{% extends 'base.html' %}

{% block title %}Registrar Envío - MiniLibros{% endblock %}

{% block content %}
<div class="container">
    <h1>¡Pago Exitoso!</h1>
    <p>Por favor, completa tu información de envío:</p>

    <form method="post" class="auth-form">
        {% csrf_token %}
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required value="{{ order.email }}">
        </div>

        <div class="form-group">
            <label for="password">Contraseña (para crear tu cuenta)</label>
            <input type="password" id="password" name="password" required>
        </div>

        <div class="form-group">
            <label for="full_name">Nombre Completo</label>
            <input type="text" id="full_name" name="full_name" required>
        </div>

        <div class="form-group">
            <label for="address">Dirección</label>
            <textarea id="address" name="address" required></textarea>
        </div>

        <div class="form-group">
            <label for="city">Ciudad</label>
            <input type="text" id="city" name="city" required>
        </div>

        <div class="form-group">
            <label for="phone">Teléfono</label>
            <input type="tel" id="phone" name="phone" required>
        </div>

        <div class="form-group">
            <label for="additional_info">Información Adicional (Opcional)</label>
            <textarea id="additional_info" name="additional_info"></textarea>
        </div>

        <button type="submit" class="btn btn-primary btn-lg">Completar Registro</button>
    </form>
</div>
{% endblock %}
