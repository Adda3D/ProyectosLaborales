{% extends 'base.html' %}

{% block title %}Registrarse - MiniLibros{% endblock %}

{% block content %}
{% load static %}
<script>
    window.FIREBASE_CONFIG = {
        apiKey: "{{ firebase_config.apiKey }}",
        authDomain: "{{ firebase_config.authDomain }}",
        projectId: "{{ firebase_config.projectId }}",
        storageBucket: "{{ firebase_config.storageBucket }}",
        messagingSenderId: "{{ firebase_config.messagingSenderId }}",
        appId: "{{ firebase_config.appId }}"
    };
</script>

<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <h1>Crear Cuenta</h1>
            <p>Únete a MiniLibros hoy mismo</p>
        </div>

        <form id="firebase-register-form" class="modern-form">
            <div class="input-container">
                <label for="reg-email" class="modern-label"><span class="label-text">Correo electrónico</span><span class="required-asterisk">*</span></label>
                <div class="input-wrapper">
                    <input type="email" id="reg-email" class="modern-input" required placeholder=" ">
                    <span class="input-placeholder">Correo electrónico</span>
                </div>
            </div>
            
            <div class="input-container">
                <label for="reg-password" class="modern-label"><span class="label-text">Contraseña</span><span class="required-asterisk">*</span></label>
                <div class="input-wrapper">
                    <input type="password" id="reg-password" class="modern-input" required placeholder=" " minlength="6">
                    <span class="input-placeholder">Contraseña (Mínimo 6 caracteres)</span>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-auth" id="register-btn">
                    <span class="btn-text">Registrarse</span>
                    <span class="btn-icon">→</span>
                </button>
            </div>

            <div class="auth-divider">
                <span class="divider-line"></span>
                <span class="divider-text">O regístrate con</span>
                <span class="divider-line"></span>
            </div>

            <button type="button" id="google-register-btn" class="social-btn google-btn" style="width: 100%; justify-content: center; border: 1px solid #ccc;">
                <svg class="social-icon google-icon" viewBox="0 0 24 24">
                    <path fill="#EA4335" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#4285F4" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#34A853" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                <span class="social-text">Google</span>
            </button>
        </form>

        <div class="auth-footer" style="text-align: center; margin-top: 20px;">
            <p class="footer-text">¿Ya tienes una cuenta? <a href="{% url 'core:login' %}" class="footer-link">Inicia sesión aquí</a></p>
        </div>
    </div>
</div>

<script type="module">
    import { auth, googleProvider, createUserWithEmailAndPassword, signInWithPopup, sendTokenToDjango } from "{% static 'js/firebase-auth.js' %}";

    const registerForm = document.getElementById('firebase-register-form');
    const googleBtn = document.getElementById('google-register-btn');
    const registerBtn = document.getElementById('register-btn');

    if (registerForm) {
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            registerBtn.disabled = true;
            registerBtn.querySelector('.btn-text').textContent = 'Creando cuenta...';
            
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const idToken = await userCredential.user.getIdToken();
                await sendTokenToDjango(idToken);
            } catch (error) {
                console.error(error);
                let msg = 'Ocurrió un error al registrarse.';
                if (error.code === 'auth/email-already-in-use') msg = 'El correo ya está en uso.';
                if (error.code === 'auth/weak-password') msg = 'La contraseña es muy débil.';
                alert(msg);
                registerBtn.disabled = false;
                registerBtn.querySelector('.btn-text').textContent = 'Registrarse';
            }
        });
    }

    if (googleBtn) {
        googleBtn.addEventListener('click', async () => {
            try {
                const result = await signInWithPopup(auth, googleProvider);
                const idToken = await result.user.getIdToken();
                await sendTokenToDjango(idToken);
            } catch (error) {
                console.error(error);
                alert('Error al registrarse con Google: ' + error.message);
            }
        });
    }
</script>
{% endblock %}
