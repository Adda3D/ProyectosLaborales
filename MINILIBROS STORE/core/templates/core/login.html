{% extends 'base.html' %}

{% block title %}Iniciar Sesión - MiniLibros{% endblock %}

{% block content %}
{% load static %}
<script>
    window.FIREBASE_CONFIG = {
        apiKey: "{{ firebase_config.apiKey }}",
        authDomain: "{{ firebase_config.authDomain }}",
        projectId: "{{ firebase_config.projectId }}",
        storageBucket: "{{ firebase_config.storageBucket }}",
        messagingSenderId: "{{ firebase_config.messagingSenderId }}",
        appId: "{{ firebase_config.appId }}"
    };
</script>

<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <h1>Bienvenido</h1>
            <p>Ingresa a tu cuenta para continuar</p>
        </div>

        <form id="firebase-login-form" class="modern-form">
            <div class="form-group">
                <label for="email" class="modern-label">Correo electrónico</label>
                <input type="email" id="email" class="modern-input" required placeholder="Ingresa tu correo">
            </div>
            <div class="form-group">
                <label for="password" class="modern-label">Contraseña</label>
                <input type="password" id="password" class="modern-input" required placeholder="Ingresa tu contraseña">
            </div>

            <button type="submit" class="btn btn-primary btn-auth" id="login-btn">Entrar</button>

            <div class="divider" style="text-align: center; margin: 20px 0;">O continúa con</div>

            <button type="button" id="google-login-btn" class="google-btn" style="width: 100%; border: 1px solid #ccc; background: white; padding: 10px; border-radius: 5px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: bold;">
                <svg class="google-icon" width="20" height="20" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
                </svg>
                Google
            </button>
        </form>

        <div class="auth-footer" style="text-align: center; margin-top: 20px;">
            <p>¿No tienes una cuenta? <a href="{% url 'core:register' %}">Regístrate aquí</a></p>
        </div>
    </div>
</div>

<script type="module">
    import { auth, googleProvider, signInWithEmailAndPassword, signInWithPopup, sendTokenToDjango } from "{% static 'js/firebase-auth.js' %}";

    const loginForm = document.getElementById('firebase-login-form');
    const googleBtn = document.getElementById('google-login-btn');
    const loginBtn = document.getElementById('login-btn');

    if (loginForm) {
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            loginBtn.disabled = true;
            loginBtn.textContent = 'Ingresando...';
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const idToken = await userCredential.user.getIdToken();
                await sendTokenToDjango(idToken);
            } catch (error) {
                console.error(error);
                let msg = 'Ocurrió un error al iniciar sesión.';
                if (error.code === 'auth/invalid-credential') msg = 'Credenciales inválidas.';
                alert(msg);
                loginBtn.disabled = false;
                loginBtn.textContent = 'Entrar';
            }
        });
    }

    if (googleBtn) {
        googleBtn.addEventListener('click', async () => {
            try {
                const result = await signInWithPopup(auth, googleProvider);
                const idToken = await result.user.getIdToken();
                await sendTokenToDjango(idToken);
            } catch (error) {
                console.error(error);
                alert('Error en login con Google: ' + error.message);
            }
        });
    }
</script>
{% endblock %}
