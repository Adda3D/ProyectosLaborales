<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
    <title>Tipo Acto Administrativo</title>
-->


  </head>


  <body>


    <div class="wrapper wrapper-content animated fadeInRight">
      <div class="row col-md-12">
        <div class="col-md-12">
          <div class="ibox">
            <div class="ibox-content p-md">
              <div id="divDecVie_ActosAdministrativosTipoHTML">
                <div class="container" id="dvDecVie_ActosAdministrativosTipoTable">
                  <div class="row">
                    <div class="col-md-6 titletab">Tipo Acto Administrativo</div>
                    <div class="col-md-6 text-center">
                      
                      <button type="button" class="btn btn-primaryiris" onclick="CrearDecVie_ActosAdministrativosTipo()" data-bs-toggle="modal" data-bs-target="#ModalDecVie_ActosAdministrativosTipo" data-bs-keyboard="false" data-bs-backdrop="static">Nuevo Tipo</button>
                    </div>
                  </div>

                  <div class="row scroll" id="tableDynamicDecVie_ActosAdministrativosTipo">
                    <div class="table-responsive col-md-12">
                      <table class="table table-bordered table-hover dataTables-example" id="tblDecVie_ActosAdministrativosTipo" >
                        <thead>
                          <tr>
                            <th>Tipo Acto Administrativo</th>                            
                            <th>Opciones</th>
                          </tr>
                        </thead>
                        <tbody>

                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>

              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

                <!-- Modal Documentos Contractuales -->
                <div class="modal fade" id="ModalDecVie_ActosAdministrativosTipo" tabindex="-1" role="dialog" aria-labelledby="ModalLabelDecVie_ActosAdministrativosTipo" data-bs-keyboard="false" data-bs-backdrop="static" aria-hidden="true">
                  <div class="modal-dialog  modal-fullscreen-sm-down modal-dialog-centered" >
                    <div class="modal-content">
                      <div class="modal-header iris-modal-header">
                        <h6 class="modal-title" id="ModalLabelDecVie_ActosAdministrativosTipo">Tipo Acto Administrativo</h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                      </div>
                      <div class="modal-body">
                        <div class="container-fluid">
                          <form class="needs-validation" id="formDecVie_ActosAdministrativosTipo" novalidate>
                            <div class="form-group row mb-3">
                              <span id="spanIdTipoActoAdministrativo" class="ocultar" ></span>
                              <div class="col-md-10">
                                <label class="form-label-iris" for="txtTipoActoAdministrativo">Nuevo Tipo</label>
                                <input type="text" class="form-control iris" id="txtTipoActoAdministrativo" maxlength="150"placeholder="Acto Administrativo" data-span="spanTipoActoAdministrativo" required/>
                                <div class="invalid-feedback">
                                    Nuevo Tipo es un campo obligatorio
                                </div>
                                <div id="spanTipoActoAdministrativo" class="color-required ocultar">
                                  No se acepta el ingreso de caracteres especiales
                                </div>
                              </div>
                            </div>                            
                          </form>
                        </div>
                      </div>
                      <div class="modal-footer iris-modal-footer">
                        <button type="button" id="btnCloseDecVie_ActosAdministrativosTipoModal" class="btn-iris white small" data-bs-dismiss="modal">Cancelar</button>
                        <input type="button" value="Guardar" onclick="ValidatePostUpdateDecVie_ActosAdministrativosTipo('formDecVie_ActosAdministrativosTipo', 'btnCloseDecVie_ActosAdministrativosTipoModal')" class="btn-iris success small"/>
                      </div>
                    </div>
                  </div>
                </div>



    <!-- Proyecto scripts -->
    <script src="../JS/iris/DecVie_ActosAdministrativosTipo.js"></script>


  </body>


</html>
