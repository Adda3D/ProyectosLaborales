<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
    <title>Ciudades</title>
-->


  </head>


  <body>


    <div class="wrapper wrapper-content animated fadeInRight">
      <div class="row col-md-12">
        <div class="col-md-12">
          <div class="ibox">
            <div class="ibox-content p-md">
              <div id="divProyectos_AlcanceProyectoHTML">
                <div class="container" id="dvProyectos_AlcanceProyectoTable">
                  <div class="row">
                    <div class="col-md-6 titletab">Alcance Proyecto</div>
                    <div class="col-md-6 text-center">
                 
                      <button type="button" class="btn btn-primaryiris" onclick="CrearProyectos_AlcanceProyecto()" data-bs-toggle="modal" data-bs-target="#ModalProyectos_AlcanceProyecto" data-bs-keyboard="false" data-bs-backdrop="static">Nuevo Alcance</button>
                    </div>
                  </div>

                  <div class="row scroll" id="tableDynamicProyectos_AlcanceProyecto">
                    <div class="table-responsive col-md-12">
                      <table class="table table-bordered table-hover dataTables-example" id="tblProyectos_AlcanceProyecto" >
                        <thead>
                          <tr>
                            <th>Alcance Proyecto</th>
                            <th>Detalles</th>
                            <th>Opciones</th>
                          </tr>
                        </thead>
                        <tbody>

                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>

              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

                <!-- Modal Documentos Contractuales -->
                <div class="modal fade" id="ModalProyectos_AlcanceProyecto" tabindex="-1" role="dialog" aria-labelledby="ModalLabelProyectos_AlcanceProyecto" data-bs-keyboard="false" data-bs-backdrop="static" aria-hidden="true">
                  <div class="modal-dialog  modal-fullscreen-sm-down modal-dialog-centered" >
                    <div class="modal-content">
                      <div class="modal-header iris-modal-header">
                        <h6 class="modal-title" id="ModalLabelProyectos_AlcanceProyecto">Alcance Proyecto</h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                      </div>
                      <div class="modal-body">
                        <div class="container-fluid">
                          <form class="needs-validation" id="formProyectos_AlcanceProyecto" novalidate>
                            <div class="form-group row mb-3">
                              <span id="spanIdProyectos_AlcanceProyecto" class="ocultar" ></span>
                              <div class="col-md-6">
                                <label class="form-label-iris" for="txtCdProyectosAlcanceProyecto">Nuevo Alcance</label>
                                <input type="text" class="form-control iris" id="txtCdProyectosAlcanceProyecto" maxlength="15"placeholder="Alcance" data-span="spanCdProyectosAlcanceProyecto" required/>
                                <div class="invalid-feedback">
                                    Nuevo Alcance es un campo obligatorio
                                </div>
                                <div id="spanCdProyectosAlcanceProyecto" class="color-required ocultar">
                                  No se acepta el ingreso de caracteres especiales
                                </div>
                              </div>
                            </div>
                            <div class="form-group row mb-3">
                              <div class="col-md-12">
                                <label class="form-label-iris" for="txtProyectos_AlcanceProyecto">Detalles</label>
                                <input type="text" class="form-control iris" id="txtProyectos_AlcanceProyecto" maxlength="120" placeholder="Detalles" data-span="spanProyectos_AlcanceProyecto" required/>
                                <div class="invalid-feedback">
                                    Detalles es un campo obligatorio
                                </div>
                                <div id="spanProyectos_AlcanceProyecto" class="color-required ocultar">
                                  No se acepta el ingreso de caracteres especiales
                                </div>
                              </div>
                            </div>
                          </form>
                        </div>
                      </div>
                      <div class="modal-footer iris-modal-footer">
                        <button type="button" id="btnCloseProyectos_AlcanceProyectoModal" class="btn-iris white small" data-bs-dismiss="modal">Cancelar</button>
                        <input type="button" value="Guardar" onclick="ValidatePostUpdateProyectos_AlcanceProyecto('formProyectos_AlcanceProyecto', 'btnCloseProyectos_AlcanceProyectoModal')" class="btn-iris success small"/>
                      </div>
                    </div>
                  </div>
                </div>



    <!-- Proyecto scripts -->
    <script src="../JS/iris/Proyectos_AlcanceProyecto.js"></script>


  </body>


</html>
