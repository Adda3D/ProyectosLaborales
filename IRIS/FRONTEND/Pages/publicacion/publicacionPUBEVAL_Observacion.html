<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
    <title>Publicación Evaluaciópn Observaciones</title>
-->

  </head>

  <body>
    
        <div class="row" >
          <div class="row">
            <div class="row">
              <div class="col-md-6 titletab">Publicación Evaluación Observaciones</div>
            </div>
            <div class="modal-body">
              <div class="container-fluid">
                <form class="needs-validation" id="formPublicacionEvaluacionObservaciones" novalidate>
                    <div class="form-group row mb-3">
                        <span id="spanPUBEVAL_ObservacionIdObservacion" class="ocultar" ></span>
                        <div class="col-md-6">
                            <label class="form-label-iris" for="txtPublicacionEvaluacionObservaciones">Observaciones Evaluación</label>
                            <textarea class="form-control iris" id="txtPublicacionEvaluacionObservaciones" maxlength="1500" rows="4" placeholder="Comentarios" data-span="spantxtPublicacionEvaluacionObservaciones" required ></textarea>
                            <div class="invalid-feedback">
                                Observaciones Evaluación es un campo obligatorio
                            </div>
                            <div id="spantxtPublicacionEvaluacionObservaciones" class="color-required ocultar">
                              No se acepta el ingreso de caracteres especiales o palabras restringidas
                            </div>
                        </div>

                    </div>
                </form>
              </div>
            </div>
            <div class="container container-fluid">              
              <input type="button" value="Guardar Observaciones" onclick="ValidatePostUpdatePublicacionEvaluacionObservaciones('formPublicacionEvaluacionObservaciones')" class="btn-iris success small"/>
            </div>
          </div>
        </div>


    <!-- Proyecto scripts -->
    <script src="../../js/iris/publicacion/publicacionPUBEVAL_Observacion.js"></script>

  </body>


</html>
