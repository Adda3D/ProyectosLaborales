<!DOCTYPE html>
<html>

  <body>


    <div class="wrapper wrapper-content animated fadeInRight">
      <div class="row col-md-12">
        <div class="col-md-12">
          <div class="ibox">
            <div class="ibox-content p-md">
              <div id="divDecVie_PlanAccionLineaPoliticaHTML">
                <div class="container" id="dvDecVie_PlanAccionLineaPoliticaTable">
                  <div class="row">
                    <div class="col-md-6 titletab">Línea Política</div>
                    <div class="col-md-6 text-center">                      
                      <button type="button" class="btn btn-primaryiris" onclick="CrearDecVie_PlanAccionLineaPolitica()" data-bs-toggle="modal" data-bs-target="#ModalDecVie_PlanAccionLineaPolitica" data-bs-keyboard="false" data-bs-backdrop="static">Nueva Línea</button>
                    </div>
                  </div>

                  <div class="row scroll" id="tableDynamicDecVie_PlanAccionLineaPolitica">
                    <div class="table-responsive col-md-12">
                      <table class="table table-bordered table-hover dataTables-example" id="tblDecVie_PlanAccionLineaPolitica" >
                        <thead>
                          <tr>
                            <th>Línea Política</th>
                            <th>Descripción</th>
                            <th>Opciones</th>
                          </tr>
                        </thead>
                        <tbody>

                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>

              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

                <!-- Modal Documentos COntractuales -->
                <div class="modal fade" id="ModalDecVie_PlanAccionLineaPolitica" tabindex="-1" role="dialog" aria-labelledby="ModalLabelDecVie_PlanAccionLineaPolitica" data-bs-keyboard="false" data-bs-backdrop="static" aria-hidden="true">
                  <div class="modal-dialog  modal-fullscreen-sm-down modal-dialog-centered" >
                    <div class="modal-content">
                      <div class="modal-header iris-modal-header">
                        <h6 class="modal-title" id="ModalLabelDecVie_PlanAccionLineaPolitica">Nueva Línea</h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                      </div>
                      <div class="modal-body">
                        <div class="container-fluid">
                          <form class="needs-validation" id="formDecVie_PlanAccionLineaPolitica" novalidate>
                            <div class="form-group row mb-3">
                              <span id="spanIdDecVie_PlanAccionLineaPolitica" class="ocultar" ></span>
                              <span id="spanIdDependenciaPlanAccionLineaPolitica" class="ocultar" ></span>
                              <div class="col-md-6">
                                <label class="form-label-iris" for="txtCdDecViePlanAccionLineaPolitica">Línea Política</label>
                                <input type="text" class="form-control iris" id="txtCdDecViePlanAccionLineaPolitica" maxlength="50"placeholder="Línea" data-span="spanCdDecViePlanAccionLineaPolitica" required/>
                                <div class="invalid-feedback">
                                    Nueva Línea es un campo obligatorio
                                </div>
                                <div id="spanCdDecViePlanAccionLineaPolitica" class="color-required ocultar">
                                  No se acepta el ingreso de caracteres especiales
                                </div>
                              </div>
                            </div>
                            <div class="form-group row mb-3">
                              <div class="col-md-12">
                                <label class="form-label-iris" for="txtDecVie_PlanAccionLineaPolitica">Descripción Línea Política</label>
                                <textarea class="form-control iris" id="txtDecVie_PlanAccionLineaPolitica" maxlength="500" rows="3" placeholder="Línea Política" data-span="spanDecVie_PlanAccionLineaPolitica"></textarea>
                                <div class="invalid-feedback">
                                  Descripción es un campo obligatorio
                                </div>
                                <div id="spanDecVie_PlanAccionLineaPolitica" class="color-required ocultar">
                                  No se acepta el ingreso de caracteres especiales
                                </div>
                              </div>
                            </div>
                          </form>
                        </div>
                      </div>
                      <div class="modal-footer iris-modal-footer">
                        <button type="button" id="btnCloseDecVie_PlanAccionLineaPoliticaModal" class="btn-iris white small" data-bs-dismiss="modal">Cancelar</button>
                        <input type="button" value="Guardar" onclick="ValidatePostUpdateDecVie_PlanAccionLineaPolitica('formDecVie_PlanAccionLineaPolitica', 'btnCloseDecVie_PlanAccionLineaPoliticaModal')" class="btn-iris success small"/>
