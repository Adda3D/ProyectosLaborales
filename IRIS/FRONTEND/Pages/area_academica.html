<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
    <title>Ciudades</title>
-->

  </head>


  <body>


    <div class="wrapper wrapper-content animated fadeInRight">
      <div class="row col-md-12">
        <div class="col-md-12">
          <div class="ibox">
            <div class="ibox-content p-md">
              <div id="divAreaAcademiaHTML">
                <div class="container" id="dvAreaAcademicaTable">
                  <div class="row">
                    <div class="col-md-6 titletab">ÁREA ACADÉMICA</div>
                    <div class="col-md-6 text-center">
                     <!-- <input type="button" value="Exportar a Excel" onclick="ExportarExcelFunction('AreaAcademica', 'DescargarExcelAreaAcademica')" class="btn btn-infoiris"/>                      -->
                      <button type="button" class="btn btn-primaryiris" onclick="CrearAreaAcademica()" data-bs-toggle="modal" data-bs-target="#ModalArea_Academica" data-bs-keyboard="false" data-bs-backdrop="static">Nueva Área</button>
                    </div>
                  </div>

                  <div class="row scroll" id="tableDynamicAreaAcademica">
                    <div class="table-responsive col-md-12">
                      <table class="table table-bordered table-hover dataTables-example" id="tblAreaAcademica" >
                        <thead>
                          <tr>
                            <th>Código</th>
                            <th>Nombre</th>
                            <th>Opciones</th>
                          </tr>
                        </thead>
                        <tbody>

                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>

              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

                <!-- Modal Area -->
                <div class="modal fade" id="ModalArea_Academica" tabindex="-1" role="dialog" aria-labelledby="ModalLabelArea_Academica" data-bs-keyboard="false" data-bs-backdrop="static" aria-hidden="true">
                  <div class="modal-dialog  modal-fullscreen-sm-down modal-dialog-centered" >
                    <div class="modal-content">
                      <div class="modal-header iris-modal-header">
                        <h6 class="modal-title" id="ModalLabelArea_Academica">Área Académica</h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                      </div>
                      <div class="modal-body">
                        <div class="container-fluid">
                          <form class="needs-validation" id="formArea_Academica" novalidate>
                            <div class="form-group row mb-3">
                              <span id="spanIdArea_Academica" class="ocultar" ></span>
                              <div class="col-md-6">
                                <label class="form-label-iris" for="txtCdAreaAcademica">Código Área</label>
                                <input type="text" class="form-control iris" id="txtCdAreaAcademica" maxlength="10"placeholder="Código" data-span="spanCdAreaAcademica" required/>
                                <div class="invalid-feedback">
                                  Código es un campo obligatorio
                                </div>
                                <div id="spanCdAreaAcademica" class="color-required ocultar">
                                  No se acepta el ingreso de caracteres especiales
                                </div>
                              </div>
                            </div>
                            <div class="form-group row mb-3">
                              <div class="col-md-12">
                                <label class="form-label-iris" for="txtArea_Academica">Nombre Área</label>
                                <input type="text" class="form-control iris" id="txtArea_Academica" maxlength="120" placeholder="Área Académica" data-span="spanArea_Academica" required/>
                                <div class="invalid-feedback">
                                  Nombre Área es un campo obligatorio
                                </div>
                                <div id="spanArea_Academica" class="color-required ocultar">
                                  No se acepta el ingreso de caracteres especiales
                                </div>
                              </div>
                            </div>
                          </form>
                        </div>
                      </div>
                      <div class="modal-footer iris-modal-footer">
                        <button type="button" id="btnCloseModal" class="btn-iris white small" data-bs-dismiss="modal">Cancelar</button>
                        <input type="button" value="Guardar" onclick="ValidatePostUpdateArea_Academica('formArea_Academica', 'btnCloseModal')" class="btn-iris success small"/>
                      </div>
                    </div>
                  </div>
                </div>



    <!-- Proyecto scripts -->
    <script src="../JS/iris/area_academica.js"></script>

  </body>


</html>
