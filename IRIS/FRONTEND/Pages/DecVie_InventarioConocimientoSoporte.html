<!DOCTYPE html>

  <body>


    <div class="wrapper wrapper-content animated fadeInRight">
      <div class="row col-md-12">
        <div class="col-md-12">
          <div class="ibox">
            <div class="ibox-content p-md">
              <div id="divDecVie_InventarioConocimientoSoporteHTML">
                <div class="container" id="dvDecVie_InventarioConocimientoSoporteTable">
                  <div class="row">
                    <div class="col-md-6 titletab">Conocimiento Soporte</div>
                    <div class="col-md-6 text-center">
                  
                      <button type="button" class="btn btn-primaryiris" onclick="CrearDecVie_InventarioConocimientoSoporte()" data-bs-toggle="modal" data-bs-target="#ModalDecVie_InventarioConocimientoSoporte" data-bs-keyboard="false" data-bs-backdrop="static">Nuevo Soporte</button>
                    </div>
                  </div>

                  <div class="row scroll" id="tableDynamicDecVie_InventarioConocimientoSoporte">
                    <div class="table-responsive col-md-12">
                      <table class="table table-bordered table-hover dataTables-example" id="tblDecVie_InventarioConocimientoSoporte" >
                        <thead>
                          <tr>
                            <th>Conocimiento Soporte</th>
                            <th>Observaciones</th>
                            <th>Opciones</th>
                          </tr>
                        </thead>
                        <tbody>

                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>

              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

                <!-- Modal Documentos Contractuales -->
                <div class="modal fade" id="ModalDecVie_InventarioConocimientoSoporte" tabindex="-1" role="dialog" aria-labelledby="ModalLabelDecVie_InventarioConocimientoSoporte" data-bs-keyboard="false" data-bs-backdrop="static" aria-hidden="true">
                  <div class="modal-dialog  modal-fullscreen-sm-down modal-dialog-centered" >
                    <div class="modal-content">
                      <div class="modal-header iris-modal-header">
                        <h6 class="modal-title" id="ModalLabelDecVie_InventarioConocimientoSoporte">Conocimiento Soporte</h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                      </div>
                      <div class="modal-body">
                        <div class="container-fluid">
                          <form class="needs-validation" id="formDecVie_InventarioConocimientoSoporte" novalidate>
                            <div class="form-group row mb-3">
                              <span id="spanIdDecVie_InventarioConocimientoSoporte" class="ocultar" ></span>
                              <div class="col-md-6">
                                <label class="form-label-iris" for="txtCdDecVieInventarioConocimientoSoporte">Nuevo Soporte</label>
                                <input type="text" class="form-control iris" id="txtCdDecVieInventarioConocimientoSoporte" maxlength="15"placeholder="Soporte" data-span="spanCdDecVieInventarioConocimientoSoporte" required/>
                                <div class="invalid-feedback">
                                    Nuevo Soporte  es un campo obligatorio
                                </div>
                                <div id="spanCdDecVieInventarioConocimientoSoporte" class="color-required ocultar">
                                  No se acepta el ingreso de caracteres especiales
                                </div>
                              </div>
                            </div>
                            <div class="form-group row mb-3">
                              <div class="col-md-12">
                                <label class="form-label-iris" for="txtDecVie_InventarioConocimientoSoporte">Observaciones</label>
                                <input type="text" class="form-control iris" id="txtDecVie_InventarioConocimientoSoporte" maxlength="120" placeholder="Observación" data-span="spanDecVie_InventarioConocimientoSoporte" required/>
                                <div class="invalid-feedback">
                                    Observaciones es un campo obligatorio
                                </div>
                                <div id="spanDecVie_InventarioConocimientoSoporte" class="color-required ocultar">
                                  No se acepta el ingreso de caracteres especiales
                                </div>
                              </div>
                            </div>
                          </form>
                        </div>
                      </div>
                      <div class="modal-footer iris-modal-footer">
                        <button type="button" id="btnCloseDecVie_InventarioConocimientoSoporteModal" class="btn-iris white small" data-bs-dismiss="modal">Cancelar</button>
                        <input type="button" value="Guardar" onclick="ValidatePostUpdateDecVie_InventarioConocimientoSoporte('formDecVie_InventarioConocimientoSoporte', 'btnCloseDecVie_InventarioConocimientoSoporteModal')" class="btn-iris success small"/>
