<!DOCTYPE html>

  <body>


    <div class="wrapper wrapper-content animated fadeInRight">

          <div class="ibox">
            <div class="ibox-content p-md">
              <div id="divDecVie_PlanAccionObjetivoEstrategicoHTML">

                  <div class="row">
                    <div class="col-md-6 titletab">Objetivos Estratégicos</div>
                    <div class="col-md-6 text-center">                      
                      <button type="button" class="btn btn-primaryiris" onclick="CrearDecVie_PlanAccionObjetivoEstrategico()" data-bs-toggle="modal" data-bs-target="#ModalDecVie_PlanAccionObjetivoEstrategico" data-bs-keyboard="false" data-bs-backdrop="static">Nuevo Objetivo</button>
                    </div>
                  </div>

                  <div class="row scroll" id="tableDynamicDecVie_PlanAccionObjetivoEstrategico">
                    <div class="table-responsive col-md-12">
                      <table class="table table-bordered table-hover dataTables-example" id="tblDecVie_PlanAccionObjetivoEstrategico" >
                        <thead>
                          <tr>
                            <th>Objetivos Estratégicos</th>
                            <th>Descripción</th>
                            <th>Opciones</th>
                          </tr>
                        </thead>
                        <tbody>

                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>

              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

                <!-- Modal Documentos COntractuales -->

                  <div class="modal-dialog  modal-fullscreen-sm-down modal-dialog-centered" >
                    <div class="modal-content">
                      <div class="modal-header iris-modal-header">
                        <h6 class="modal-title" id="ModalLabelDecVie_PlanAccionObjetivoEstrategico">Objetivos Estratégicos</h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                      </div>
                      <div class="modal-body">
                        <div class="container-fluid">
                          <form class="needs-validation" id="formDecVie_PlanAccionObjetivoEstrategico" novalidate>
                            <div class="form-group row mb-3">
                              <span id="spanIdDecVie_PlanAccionObjetivoEstrategico" class="ocultar" ></span>
                              <span id="spanIdDependenciaPlanAccionObjetivoEstrategico" class="ocultar" ></span>
                              <div class="col-md-6">
                                <label class="form-label-iris" for="txtCdDecViePlanAccionObjetivoEstrategico">Objetivos Estratégicos</label>
                                <input type="text" class="form-control iris" id="txtCdDecViePlanAccionObjetivoEstrategico" maxlength="50"placeholder="Objetivo" data-span="spanCdDecViePlanAccionObjetivoEstrategico" required/>
                                <div class="invalid-feedback">
                                    Objetivo  Estratégico es un campo obligatorio
                                </div>
                                <div id="spanCdDecViePlanAccionObjetivoEstrategico" class="color-required ocultar">
                                  No se acepta el ingreso de caracteres especiales
                                </div>
                              </div>
                            </div>
                            <div class="form-group row mb-3">
                              <div class="col-md-12">
                                <label class="form-label-iris" for="txtDecVie_PlanAccionObjetivoEstrategico">Descripción Objetivo Estratérgico</label>
                                <textarea class="form-control iris" id="txtDecVie_PlanAccionObjetivoEstrategico" maxlength="500" rows="3" placeholder="Objetivo Estratégico" data-span="spanDecVie_PlanAccionObjetivoEstrategico"></textarea>
                                <div class="invalid-feedback">
                                  Descripción es un campo obligatorio
                                </div>
                                <div id="spanDecVie_PlanAccionObjetivoEstrategico" class="color-required ocultar">

                                </div>
                              </div>
                            </div>

                      </div>

                        <button type="button" id="btnCloseDecVie_PlanAccionObjetivoEstrategicoModal" class="btn-iris white small" data-bs-dismiss="modal">Cancelar</button>
