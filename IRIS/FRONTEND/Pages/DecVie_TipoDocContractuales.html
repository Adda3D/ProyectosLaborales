<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
    <title>Ciudades</title>
-->


  </head>


  <body>


    <div class="wrapper wrapper-content animated fadeInRight">
      <div class="row col-md-12">
        <div class="col-md-12">
          <div class="ibox">
            <div class="ibox-content p-md">
              <div id="divDecVieTipoDocContractualesHTML">
                <div class="container" id="dvDecVieTipoDocContractualesTable">
                  <div class="row">
                    <div class="col-md-6 titletab">Documentos Contractuales</div>
                    <div class="col-md-6 text-center">
                  
                      <button type="button" class="btn btn-primaryiris" onclick="CrearDecVieTipoDocContractuales()" data-bs-toggle="modal" data-bs-target="#ModalDecVie_TipoDocContractuales" data-bs-keyboard="false" data-bs-backdrop="static">Nuevo Documento</button>
                    </div>
                  </div>

                  <div class="row scroll" id="tableDynamicDecVieTipoDocContractuales">
                    <div class="table-responsive col-md-12">
                      <table class="table table-bordered table-hover dataTables-example" id="tblDecVieTipoDocContractuales" >
                        <thead>
                          <tr>
                            <th>Documento Contractual</th>
                            <th>Observaciones</th>
                            <th>Opciones</th>
                          </tr>
                        </thead>
                        <tbody>

                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>

              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

                <!-- Modal Documentos COntractuales -->
                <div class="modal fade" id="ModalDecVie_TipoDocContractuales" tabindex="-1" role="dialog" aria-labelledby="ModalLabelDecVie_TipoDocContractuales" data-bs-keyboard="false" data-bs-backdrop="static" aria-hidden="true">
                  <div class="modal-dialog  modal-fullscreen-sm-down modal-dialog-centered" >
                    <div class="modal-content">
                      <div class="modal-header iris-modal-header">
                        <h6 class="modal-title" id="ModalLabelDecVie_TipoDocContractuales">Documento Contractual</h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                      </div>
                      <div class="modal-body">
                        <div class="container-fluid">
                          <form class="needs-validation" id="formDecVie_TipoDocContractuales" novalidate>
                            <div class="form-group row mb-3">
                              <span id="spanIdDecVie_TipoDocContractuales" class="ocultar" ></span>
                              <div class="col-md-6">
                                <label class="form-label-iris" for="txtCdDecVieTipoDocContractuales">Documento Contractual</label>
                                <input type="text" class="form-control iris" id="txtCdDecVieTipoDocContractuales" maxlength="10"placeholder="Documento Contractual" data-span="spanCdDecVieTipoDocContractuales" required/>
                                <div class="invalid-feedback">
                                  Nombre Documento Contractual es un campo obligatorio
                                </div>
                                <div id="spanCdDecVieTipoDocContractuales" class="color-required ocultar">
                                  No se acepta el ingreso de caracteres especiales
                                </div>
                              </div>
                            </div>
                            <div class="form-group row mb-3">
                              <div class="col-md-12">
                                <label class="form-label-iris" for="txtDecVie_TipoDocContractuales">Observaciones</label>
                                <input type="text" class="form-control iris" id="txtDecVie_TipoDocContractuales" maxlength="120" placeholder="Observaciones" data-span="spanDecVie_TipoDocContractuales" required/>
                                <div class="invalid-feedback">
                                  Observaciones es un campo obligatorio
                                </div>
                                <div id="spanDecVie_TipoDocContractuales" class="color-required ocultar">
                                  No se acepta el ingreso de caracteres especiales
                                </div>
                              </div>
                            </div>
                          </form>
                        </div>
                      </div>
                      <div class="modal-footer iris-modal-footer">
                        <button type="button" id="btnCloseTipoDocContractualesModal" class="btn-iris white small" data-bs-dismiss="modal">Cancelar</button>
                        <input type="button" value="Guardar" onclick="ValidatePostUpdateDecVie_TipoDocContractuales('formDecVie_TipoDocContractuales', 'btnCloseTipoDocContractualesModal')" class="btn-iris success small"/>
                      </div>
                    </div>
                  </div>
                </div>



    <!-- Proyecto scripts -->
    <script src="../JS/iris/DecVie_TipoDocContractuales.js"></script>


  </body>


</html>
