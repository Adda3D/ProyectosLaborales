<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Expires" content="0">
    <meta http-equiv="Last-Modified" content="0">
    <meta http-equiv="Cache-Control" content="no-cache, mustrevalidate">
    <meta http-equiv="Pragma" content="no-cache">    

    <!--
    <title>Ciudades</title>
-->


  </head>


  <body>


    <div class="wrapper wrapper-content animated fadeInRight">
      <div class="row col-md-12">
        <div class="col-md-12">
          <div class="ibox">
            <div class="ibox-content p-md">
              <div id="divProyectos_TipoProductoHTML">
                <div class="container" id="dvProyectos_TipoProductoTable">
                  <div class="row">
                    <div class="col-md-6 titletab">Tipo Producto</div>
                    <div class="col-md-6 text-center">
                  
                      <button type="button" class="btn btn-primaryiris" onclick="CrearProyectos_TipoProducto()" data-bs-toggle="modal" data-bs-target="#ModalProyectos_TipoProducto" data-bs-keyboard="false" data-bs-backdrop="static">Nuevo Tipo</button>
                    </div>
                  </div>

                  <div class="row scroll" id="tableDynamicProyectos_TipoProducto">
                    <div class="table-responsive col-md-12">
                      <table class="table table-bordered table-hover dataTables-example" id="tblProyectos_TipoProducto" >
                        <thead>
                          <tr>
                            <th>Tipo Producto</th>                            
                            <th>Opciones</th>
                          </tr>
                        </thead>
                        <tbody>

                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>

              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

                <!-- Modal Documentos Contractuales -->
                <div class="modal fade" id="ModalProyectos_TipoProducto" tabindex="-1" role="dialog" aria-labelledby="ModalLabelProyectos_TipoProducto" data-bs-keyboard="false" data-bs-backdrop="static" aria-hidden="true">
                  <div class="modal-dialog  modal-fullscreen-sm-down modal-dialog-centered" >
                    <div class="modal-content">
                      <div class="modal-header iris-modal-header">
                        <h6 class="modal-title" id="ModalLabelProyectos_TipoProducto">Tipo Producto</h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                      </div>
                      <div class="modal-body">
                        <div class="container-fluid">
                          <form class="needs-validation" id="formProyectos_TipoProducto" novalidate>
                            <div class="form-group row mb-3">
                              <span id="spanIdProyectos_TipoProducto" class="ocultar" ></span>
                              <div class="col-md-10">
                                <label class="form-label-iris" for="txtCdProyectosTipoProducto">Nuevo Tipo</label>
                                <input type="text" class="form-control iris" id="txtCdProyectosTipoProducto" maxlength="200"placeholder="Tipo" data-span="spanCdProyectosTipoProducto" required/>
                                <div class="invalid-feedback">
                                    Nuevo Tipo es un campo obligatorio
                                </div>
                                <div id="spanCdProyectosTipoProducto" class="color-required ocultar">
                                  No se acepta el ingreso de caracteres especiales
                                </div>
                              </div>
                            </div>                            
                          </form>
                        </div>
                      </div>
                      <div class="modal-footer iris-modal-footer">
                        <button type="button" id="btnCloseProyectos_TipoProductoModal" class="btn-iris white small" data-bs-dismiss="modal">Cancelar</button>
                        <input type="button" value="Guardar" onclick="ValidatePostUpdateProyectos_TipoProducto('formProyectos_TipoProducto', 'btnCloseProyectos_TipoProductoModal')" class="btn-iris success small"/>
                      </div>
                    </div>
                  </div>
                </div>



    <!-- Proyecto scripts -->
    <script src="../JS/iris/Proyectos_TipoProducto.js"></script>


  </body>


</html>
