<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
    <title>Ciudades</title>
-->


  </head>


  <body>


    <div class="wrapper wrapper-content animated fadeInRight">
      <div class="row col-md-12">
        <div class="col-md-12">
          <div class="ibox">
            <div class="ibox-content p-md">
              <div id="divPublicaciones_ImpresionTintasTacoHTML">
                <div class="container" id="dvPublicaciones_ImpresionTintasTacoTable">
                  <div class="row">
                    <div class="col-md-6 titletab">Tintas Taco</div>
                    <div class="col-md-6 text-center">                      
                      <button type="button" class="btn btn-primaryiris" onclick="CrearPublicaciones_ImpresionTintasTaco()" data-bs-toggle="modal" data-bs-target="#ModalPublicaciones_ImpresionTintasTaco" data-bs-keyboard="false" data-bs-backdrop="static">Nuevo Número</button>
                    </div>
                  </div>

                  <div class="row scroll" id="tableDynamicPublicaciones_ImpresionTintasTaco">
                    <div class="table-responsive col-md-12">
                      <table class="table table-bordered table-hover dataTables-example" id="tblPublicaciones_ImpresionTintasTaco" >
                        <thead>
                          <tr>
                            <th>Tintas Taco</th>
                            <th>Observaciones</th>
                            <th>Opciones</th>
                          </tr>
                        </thead>
                        <tbody>

                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>

              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

                <!-- Modal Documentos Contractuales -->
                <div class="modal fade" id="ModalPublicaciones_ImpresionTintasTaco" tabindex="-1" role="dialog" aria-labelledby="ModalLabelPublicaciones_ImpresionTintasTaco" data-bs-keyboard="false" data-bs-backdrop="static" aria-hidden="true">
                  <div class="modal-dialog  modal-fullscreen-sm-down modal-dialog-centered" >
                    <div class="modal-content">
                      <div class="modal-header iris-modal-header">
                        <h6 class="modal-title" id="ModalLabelPublicaciones_ImpresionTintasTaco">Tintas Taco</h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                      </div>
                      <div class="modal-body">
                        <div class="container-fluid">
                          <form class="needs-validation" id="formPublicaciones_ImpresionTintasTaco" novalidate>
                            <div class="form-group row mb-3">
                              <span id="spanIdPublicaciones_ImpresionTintasTaco" class="ocultar" ></span>
                              <div class="col-md-6">
                                <label class="form-label-iris" for="txtCdPublicacionesImpresionTintasTaco">Nuevo Número</label>
                                <input type="text" class="form-control iris" id="txtCdPublicacionesImpresionTintasTaco" maxlength="50"placeholder="Número" data-span="spanCdPublicacionesImpresionTintasTaco" required/>
                                <div class="invalid-feedback">
                                    Nuevo Número es un campo obligatorio
                                </div>
                                <div id="spanCdPublicacionesImpresionTintasTaco" class="color-required ocultar">
                                  No se acepta el ingreso de caracteres especiales
                                </div>
                              </div>
                            </div>
                            <div class="form-group row mb-3">
                              <div class="col-md-12">
                                <label class="form-label-iris" for="txtPublicaciones_ImpresionTintasTaco">Observaciones</label>
                                <input type="text" class="form-control iris" id="txtPublicaciones_ImpresionTintasTaco" maxlength="120" placeholder="Observación" data-span="spanPublicaciones_ImpresionTintasTaco" required/>
                                <div class="invalid-feedback">
                                    Observaciones es un campo obligatorio
                                </div>
                                <div id="spanPublicaciones_ImpresionTintasTaco" class="color-required ocultar">
                                  No se acepta el ingreso de caracteres especiales
                                </div>
                              </div>
                            </div>
                          </form>
                        </div>
                      </div>
                      <div class="modal-footer iris-modal-footer">
                        <button type="button" id="btnClosePublicaciones_ImpresionTintasTacoModal" class="btn-iris white small" data-bs-dismiss="modal">Cancelar</button>
                        <input type="button" value="Guardar" onclick="ValidatePostUpdatePublicaciones_ImpresionTintasTaco('formPublicaciones_ImpresionTintasTaco', 'btnClosePublicaciones_ImpresionTintasTacoModal')" class="btn-iris success small"/>
                      </div>
                    </div>
                  </div>
                </div>



    <!-- Proyecto scripts -->
    <script src="../JS/iris/Publicaciones_ImpresionTintasTaco.js"></script>


  </body>


</html>
