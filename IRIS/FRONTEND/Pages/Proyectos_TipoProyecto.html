<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Expires" content="0">
    <meta http-equiv="Last-Modified" content="0">
    <meta http-equiv="Cache-Control" content="no-cache, mustrevalidate">
    <meta http-equiv="Pragma" content="no-cache">    

    <!--
    <title>Ciudades</title>
-->


  </head>


  <body>


    <div class="wrapper wrapper-content animated fadeInRight">
      <div class="row col-md-12">
        <div class="col-md-12">
          <div class="ibox">
            <div class="ibox-content p-md">
              <div id="divProyectos_TipoProyectoHTML">
                <div class="container" id="dvProyectos_TipoProyectoTable">
                  <div class="row">
                    <div class="col-md-6 titletab">Tipo Proyecto</div>
                    <div class="col-md-6 text-center">
                 
                      <button type="button" class="btn btn-primaryiris" onclick="CrearProyectos_TipoProyecto()" data-bs-toggle="modal" data-bs-target="#ModalProyectos_TipoProyecto" data-bs-keyboard="false" data-bs-backdrop="static">Nuevo Tipo</button>
                    </div>
                  </div>

                  <div class="row scroll" id="tableDynamicProyectos_TipoProyecto">
                    <div class="table-responsive col-md-12">
                      <table class="table table-bordered table-hover dataTables-example" id="tblProyectos_TipoProyecto" >
                        <thead>
                          <tr>
                            <th>Tipo Proyecto</th>
                            <th>Detalles</th>
                            <th>Opciones</th>
                          </tr>
                        </thead>
                        <tbody>

                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>

              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

                <!-- Modal Documentos Contractuales -->
                <div class="modal fade" id="ModalProyectos_TipoProyecto" tabindex="-1" role="dialog" aria-labelledby="ModalLabelProyectos_TipoProyecto" data-bs-keyboard="false" data-bs-backdrop="static" aria-hidden="true">
                  <div class="modal-dialog  modal-fullscreen-sm-down modal-dialog-centered" >
                    <div class="modal-content">
                      <div class="modal-header iris-modal-header">
                        <h6 class="modal-title" id="ModalLabelProyectos_TipoProyecto">Tipo Proyecto</h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                      </div>
                      <div class="modal-body">
                        <div class="container-fluid">
                          <form class="needs-validation" id="formProyectos_TipoProyecto" novalidate>
                            <div class="form-group row mb-3">
                              <span id="spanIdProyectos_TipoProyecto" class="ocultar" ></span>
                              <div class="col-md-6">
                                <label class="form-label-iris" for="txtCdProyectosTipoProyecto">Nuevo Tipo</label>
                                <input type="text" class="form-control iris" id="txtCdProyectosTipoProyecto" maxlength="200" placeholder="Tipo" data-span="spanCdProyectosTipoProyecto" required/>
                                <div class="invalid-feedback">
                                    Nuevo Tipo es un campo obligatorio
                                </div>
                                <div id="spanCdProyectosTipoProyecto" class="color-required ocultar">
                                  No se acepta el ingreso de caracteres especiales
                                </div>
                              </div>
                            </div>
                            <div class="form-group row mb-3">
                              <div class="col-md-12">
                                <label class="form-label-iris" for="txtProyectos_TipoProyecto">Detalles</label>
                                <input type="text" class="form-control iris" id="txtProyectos_TipoProyecto" maxlength="500" placeholder="Detalles" data-span="spanProyectos_TipoProyecto" required/>
                                <div class="invalid-feedback">
                                    Detalles es un campo obligatorio
                                </div>
                                <div id="spanProyectos_TipoProyecto" class="color-required ocultar">
                                  No se acepta el ingreso de caracteres especiales
                                </div>
                              </div>
                            </div>
                          </form>
                        </div>
                      </div>
                      <div class="modal-footer iris-modal-footer">
                        <button type="button" id="btnCloseProyectos_TipoProyectoModal" class="btn-iris white small" data-bs-dismiss="modal">Cancelar</button>
                        <input type="button" value="Guardar" onclick="ValidatePostUpdateProyectos_TipoProyecto('formProyectos_TipoProyecto', 'btnCloseProyectos_TipoProyectoModal')" class="btn-iris success small"/>
                      </div>
                    </div>
                  </div>
                </div>



    <!-- Proyecto scripts -->
    <script src="../JS/iris/Proyectos_TipoProyecto.js"></script>


  </body>


</html>
