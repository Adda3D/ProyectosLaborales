<html>

            <div class="ibox-content p-md">
              <div id="divPrestadorServicioHTML">

                    <div class="col-md-6 titletab">PRESTADORES DE SERVICIO</div>

                    </div>
                  </div>

                  <div class="row scroll" id="tableDynamicPrestadorServicio">

                        </thead>
                        <tbody>

                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>

              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    
    <div class="row ocultar col-md-12 scroll" id="dvPrestadorServicioDetalle"></div>
