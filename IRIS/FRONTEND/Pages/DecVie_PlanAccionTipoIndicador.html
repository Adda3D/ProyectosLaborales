<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
    <title>Ciudades</title>
-->


  </head>


  <body>


    <div class="wrapper wrapper-content animated fadeInRight">
      <div class="row col-md-12">
        <div class="col-md-12">
          <div class="ibox">
            <div class="ibox-content p-md">
              <div id="divDecVie_PlanAccionTipoIndicadorHTML">
                <div class="container" id="dvDecVie_PlanAccionTipoIndicadorTable">
                  <div class="row">
                    <div class="col-md-6 titletab">Tipo de Indicador</div>
                    <div class="col-md-6 text-center">
                  
                      <button type="button" class="btn btn-primaryiris" onclick="CrearDecVie_PlanAccionTipoIndicador()" data-bs-toggle="modal" data-bs-target="#ModalDecVie_PlanAccionTipoIndicador" data-bs-keyboard="false" data-bs-backdrop="static">Nuevo Tipo</button>
                    </div>
                  </div>

                  <div class="row scroll" id="tableDynamicDecVie_PlanAccionTipoIndicador">
                    <div class="table-responsive col-md-12">
                      <table class="table table-bordered table-hover dataTables-example" id="tblDecVie_PlanAccionTipoIndicador" >
                        <thead>
                          <tr>
                            <th>Tipo de Indicador</th>
                            <th>Observaciones</th>
                            <th>Opciones</th>
                          </tr>
                        </thead>
                        <tbody>

                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>

              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

                <!-- Modal Documentos COntractuales -->
                <div class="modal fade" id="ModalDecVie_PlanAccionTipoIndicador" tabindex="-1" role="dialog" aria-labelledby="ModalLabelDecVie_PlanAccionTipoIndicador" data-bs-keyboard="false" data-bs-backdrop="static" aria-hidden="true">
                  <div class="modal-dialog  modal-fullscreen-sm-down modal-dialog-centered" >
                    <div class="modal-content">
                      <div class="modal-header iris-modal-header">
                        <h6 class="modal-title" id="ModalLabelDecVie_PlanAccionTipoIndicador">Tipo de Indicador</h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                      </div>
                      <div class="modal-body">
                        <div class="container-fluid">
                          <form class="needs-validation" id="formDecVie_PlanAccionTipoIndicador" novalidate>
                            <div class="form-group row mb-3">
                              <span id="spanIdDecVie_PlanAccionTipoIndicador" class="ocultar" ></span>
                              <span id="spanIdDependenciaPlanAccionTipoIndicador" class="ocultar" ></span>
                              <div class="col-md-6">
                                <label class="form-label-iris" for="txtCdDecViePlanAccionTipoIndicador">Tipo de Indicador</label>
                                <input type="text" class="form-control iris" id="txtCdDecViePlanAccionTipoIndicador" maxlength="100"placeholder="Tipo" data-span="spanCdDecViePlanAccionTipoIndicador" required/>
                                <div class="invalid-feedback">
                                    Tipo de Indicador es un campo obligatorio
                                </div>
                                <div id="spanCdDecViePlanAccionTipoIndicador" class="color-required ocultar">
                                  No se acepta el ingreso de caracteres especiales
                                </div>
                              </div>
                            </div>
                            <div class="form-group row mb-3">
                              <div class="col-md-12">
                                <label class="form-label-iris" for="txtDecVie_PlanAccionTipoIndicador">Observaciones</label>
                                <input type="text" class="form-control iris" id="txtDecVie_PlanAccionTipoIndicador" maxlength="120" placeholder="Observaciones" data-span="spanDecVie_PlanAccionTipoIndicador" required/>
                                <div class="invalid-feedback">
                                  Observaciones es un campo obligatorio
                                </div>
                                <div id="spanDecVie_PlanAccionTipoIndicador" class="color-required ocultar">
                                  No se acepta el ingreso de caracteres especiales
                                </div>
                              </div>
                            </div>
                          </form>
                        </div>
                      </div>
                      <div class="modal-footer iris-modal-footer">
                        <button type="button" id="btnCloseDecVie_PlanAccionTipoIndicadorModal" class="btn-iris white small" data-bs-dismiss="modal">Cancelar</button>
                        <input type="button" value="Guardar" onclick="ValidatePostUpdateDecVie_PlanAccionTipoIndicador('formDecVie_PlanAccionTipoIndicador', 'btnCloseDecVie_PlanAccionTipoIndicadorModal')" class="btn-iris success small"/>
                      </div>
                    </div>
                  </div>
                </div>



    <!-- Proyecto scripts -->
    <script src="../JS/iris/DecVie_PlanAccionTipoIndicador.js"></script>


  </body>


</html>
