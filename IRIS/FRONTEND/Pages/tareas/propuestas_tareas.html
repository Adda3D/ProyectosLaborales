<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
    <title>GESTION TAREAS</title>
-->

  </head>

  <body>

    <div class="row">
        <div class="row">
          <div class="col-md-6 titletab">TAREAS PROPUESTA</div>
        </div>
        <div class="row">
          <div class="form-group row mb-3">            
            <div class="col-md-3">
              <label class="form-label-iris" for="txtConsPropuestaTareas">Consecutivo</label>
              <input type="text" class="form-control iris" id="txtConsPropuestaTareas" disabled/>
            </div>
            <div class="col-md-4">
              <label class="form-label-iris" for="txtNombrePropuestaTareas">Nombre Propuesta</label>
              <textarea class="form-control iris" id="txtNombrePropuestaTareas" rows="2" disabled></textarea>                                
            </div>
            <div class="col-md-4 text-center">
              <button type="button" class="btn-iris success " onclick="VolverTablaPropuestasDesdeTareasForm()">Volver Listado Propuestas</button>
              <button type="button" class="btn btn-primaryiris" onclick="CrearPropuestasTareas()" data-bs-toggle="modal" data-bs-target="#ModalPropuestasTareas" data-bs-keyboard="false" data-bs-backdrop="static">Nueva Tarea</button>
            </div>  
          </div>
        </div>

        <div class="row scroll" id="tablePropuestasTareas">
          <div class="table-responsive col-md-12">
            <table class="table table-bordered table-hover dataTables-example" width="100%" id="tblPropuestasTareas" >
              <thead>
                <tr> 
                    <th>Vencimiento</th>
                    <th>Tarea</th>                    
                    <th>Responsable</th>
                    <th>Estado</th>
                    <th>Avance</th>
                    <th>Finalización</th>    
                    <th>Asignado Por</th>
                    <th>Opciones</th>
                </tr>
              </thead>
              <tbody>

              </tbody>
            </table>
          </div>
        </div>
    </div>


                <!-- Modal Asignación Tarea -->
                <div class="modal fade" id="ModalPropuestasTareas" tabindex="-1" role="dialog" aria-labelledby="ModalLabelPropuestasTareas" data-bs-keyboard="false" data-bs-backdrop="static" aria-hidden="true">
                    <div class="modal-dialog modal-xl modal-fullscreen-xl-down modal-dialog-centered" >
                      <div class="modal-content">
                        <div class="modal-header iris-modal-header">
                          <h6 class="modal-title" id="ModalLabelPropuestasTareas">Datos Asignación <Tarea></Tarea></h6>
                          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                          <div class="container-fluid">
                              <form class="needs-validation" id="formPropuestasTareas" novalidate>
  
                              </form>
                          </div>
                        </div>
                        <div class="modal-footer iris-modal-footer">
                          <button type="button" id="btnClosePropuestasTareasModal" onclick="CerrarPropuestaTareasDesdeEdicion()" class="btn-iris white small" data-bs-dismiss="modal">Cancelar</button>
                          <input type="button" value="Guardar" onclick="ValidatePostUpdatePropuestasTareasForm('formPropuestasTareas', 'btnClosePropuestasTareasModal')" class="btn-iris success small"/>
                        </div>
                      </div>
                    </div>
                </div>
  
  


    <!-- Proyecto scripts -->
    <script src="../../js/iris/models/tareas/tarea_crearModuloModel.js" ></script>
    <script src="../../js/iris/tareas/propuestas_tareas.js"></script>

  </body>


</html>
