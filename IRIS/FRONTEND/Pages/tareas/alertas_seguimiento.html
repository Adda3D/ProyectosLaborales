<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
    <title>Inicio</title>
-->

  </head>


  <body>


  <div class="row col-md-10 offset-md-1 scroll">
    <div class="row">
      <div class="col-md-6 titletab">MIS ALERTAS SEGUIMIENTO</div>
    </div>
    <div class="row">      
      <div class="col-md-4 text-center"></div>      
      <div class="col-md-3 text-center">     
        <div class="col-md-4">
          <label class="form-label-iris">Filtro Alertas:</label>
        </div>  
        <div class="col-md-6 font-size-iris">
          <select class="form-combo iris input-sm w-100 font-size-iris" style="width: 100%;" id="cboFiltroAlertaSeguimientoUsuario" onchange="ActualizarFiltroDataTableAlerta_SeguimientoUsuario();">
            <option value="TODAS">TODAS</option>
            <option value="ABIERTA" selected>ABIERTA</option>
            <option value="CERRADA">CERRADA</option>            
          </select>          
        </div>
      </div>    
      <div class="col-md-1 text-center"></div>
      <div class="col-md-3 text-center">
        <button type="button" class="btn btn-primaryiris" onclick="CrearNotificacionSeguimientoUsuarioGeneral()"  data-bs-toggle="modal" data-bs-target="#ModalGenerarAlertaUsuarioGeneral" data-bs-keyboard="false" data-bs-backdrop="static">Nueva Alerta</button>
        <button type="button" class="btn-iris success " onclick="RefreshDataTableAlerta_SeguimientoUsuario();">Refrescar</button>
      </div>
    </div>
    <div class="row" id="tableAlertasSeguimientoUsuario">
      <div class="table-responsive col-md-12">
        <table class="table table-bordered table-hover dataTables-example" width="100%" id="tblAlertasSeguimientoUsuario" >
          <thead>
            <tr> 
                <th>Vencimiento</th>
                <th>Módulo</th>
                <th>Consecutivo</th>
                <th>Título</th>
                <th>Estado</th>                
                <th>Días</th>
                <th>Cierre</th>
                <th>Opciones</th>
            </tr>
          </thead>
          <tbody>

          </tbody>
        </table>
      </div>
    </div>

  </div>

                <!-- Modal Generación Alerta General -->
                <div class="modal fade" id="ModalGenerarAlertaUsuarioGeneral" tabindex="-1" role="dialog" aria-labelledby="ModalLabelGenerarAlertaUsuarioGeneral" data-bs-keyboard="false" data-bs-backdrop="static" aria-hidden="true">
                  <div class="modal-dialog modal-xl modal-fullscreen-xl-down modal-dialog-centered" >
                    <div class="modal-content">
                      <div class="modal-header iris-modal-header">
                        <h6 class="modal-title" id="ModalLabelGenerarAlertaUsuarioGeneral">Generar Alerta Seguimiento</h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                      </div>
                      <div class="modal-body">
                        <div class="container-fluid">
                            <form class="needs-validation" id="formModalGenerarAlertaUsuarioGeneral" novalidate>

                            </form>
                        </div>
                      </div>
                      <div class="modal-footer iris-modal-footer">
                        <button type="button" id="btnCloseModalGenerarAlertaUsuarioGeneralModal" class="btn-iris white small" data-bs-dismiss="modal">Cancelar</button>
                        <input type="button" value="Guardar" onclick="ValidatePostUpdateModalGenerarAlertaUsuarioGeneralForm('formModalGenerarAlertaUsuarioGeneral', 'btnCloseModalGenerarAlertaUsuarioGeneralModal')" class="btn-iris success small"/>
                      </div>
                    </div>
                  </div>
                </div>


  </body>


</html>
