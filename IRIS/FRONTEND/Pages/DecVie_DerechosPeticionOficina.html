<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
    <title>Ciudades</title>
-->


  </head>


  <body>


    <div class="wrapper wrapper-content animated fadeInRight">
      <div class="row col-md-12">
        <div class="col-md-12">
          <div class="ibox">
            <div class="ibox-content p-md">
              <div id="divDecVie_DerechosPeticionOficinaHTML">
                <div class="container" id="dvDecVie_DerechosPeticionOficinaTable">
                  <div class="row">
                    <div class="col-md-6 titletab">Derechos de Petición Oficina</div>
                    <div class="col-md-6 text-center">                    
                      <button type="button" class="btn btn-primaryiris" onclick="CrearDecVie_DerechosPeticionOficina()" data-bs-toggle="modal" data-bs-target="#ModalDecVie_DerechosPeticionOficina" data-bs-keyboard="false" data-bs-backdrop="static">Nueva Oficina</button>
                    </div>
                  </div>

                  <div class="row scroll" id="tableDynamicDecVie_DerechosPeticionOficina">
                    <div class="table-responsive col-md-12">
                      <table class="table table-bordered table-hover dataTables-example" id="tblDecVie_DerechosPeticionOficina" >
                        <thead>
                          <tr>
                            <th>Oficina</th>
                            <th>Observaciones</th>
                            <th>Opciones</th>
                          </tr>
                        </thead>
                        <tbody>

                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>

              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

                <!-- Modal Documentos Contractuales -->
                <div class="modal fade" id="ModalDecVie_DerechosPeticionOficina" tabindex="-1" role="dialog" aria-labelledby="ModalLabelDecVie_DerechosPeticionOficina" data-bs-keyboard="false" data-bs-backdrop="static" aria-hidden="true">
                  <div class="modal-dialog  modal-fullscreen-sm-down modal-dialog-centered" >
                    <div class="modal-content">
                      <div class="modal-header iris-modal-header">
                        <h6 class="modal-title" id="ModalLabelDecVie_DerechosPeticionOficina">Derechos de Petición Oficina</h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                      </div>
                      <div class="modal-body">
                        <div class="container-fluid">
                          <form class="needs-validation" id="formDecVie_DerechosPeticionOficina" novalidate>
                            <div class="form-group row mb-3">
                              <span id="spanIdDecVie_DerechosPeticionOficina" class="ocultar" ></span>
                              <div class="col-md-6">
                                <label class="form-label-iris" for="txtCdDecVieDerechosPeticionOficina">Nueva Oficina</label>
                                <input type="text" class="form-control iris" id="txtCdDecVieDerechosPeticionOficina" maxlength="15"placeholder="Oficina" data-span="spanCdDecVieDerechosPeticionOficina" required/>
                                <div class="invalid-feedback">
                                    Nueva Oficina es un campo obligatorio
                                </div>
                                <div id="spanCdDecVieDerechosPeticionOficina" class="color-required ocultar">
                                  No se acepta el ingreso de caracteres especiales
                                </div>
                              </div>
                            </div>
                            <div class="form-group row mb-3">
                              <div class="col-md-12">
                                <label class="form-label-iris" for="txtDecVie_DerechosPeticionOficina">Observaciones</label>
                                <input type="text" class="form-control iris" id="txtDecVie_DerechosPeticionOficina" maxlength="120" placeholder="Observación" data-span="spanDecVie_DerechosPeticionOficina" required/>
                                <div class="invalid-feedback">
                                    Observaciones es un campo obligatorio
                                </div>
                                <div id="spanDecVie_DerechosPeticionOficina" class="color-required ocultar">
                                  No se acepta el ingreso de caracteres especiales
                                </div>
                              </div>
                            </div>
                          </form>
                        </div>
                      </div>
                      <div class="modal-footer iris-modal-footer">
                        <button type="button" id="btnCloseDecVie_DerechosPeticionOficinaModal" class="btn-iris white small" data-bs-dismiss="modal">Cancelar</button>
                        <input type="button" value="Guardar" onclick="ValidatePostUpdateDecVie_DerechosPeticionOficina('formDecVie_DerechosPeticionOficina', 'btnCloseDecVie_DerechosPeticionOficinaModal')" class="btn-iris success small"/>
                      </div>
                    </div>
                  </div>
                </div>



    <!-- Proyecto scripts -->
    <script src="../JS/iris/DecVie_DerechosPeticionOficina.js"></script>


  </body>


</html>
