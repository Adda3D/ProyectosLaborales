<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
    <title>Usuarios Aplicacion</title>
-->

  </head>

  <body>

    <div class="wrapper wrapper-content animated fadeInRight">
      <div class="row col-md-12">
        <div class="col-md-12">
          <div class="ibox">
            <div class="ibox-content p-md">
              <div id="divUsuariosAppHTML">
                <span id="spanIdUsuarioApp" class="ocultar" ></span>                

                <div class="container" id="dvUsuariosAppTable">
                  <div class="row">
                    <div class="col-md-6 titletab">Usuarios</div>
                    <div class="col-md-6 text-center">                      
                      <button type="button" class="btn btn-primaryiris" onclick="CrearUsuariosApp()" data-bs-toggle="modal" data-bs-target="#ModalUsuariosApp" data-bs-keyboard="false" data-bs-backdrop="static">Crear Usuario</button>
                    </div>
                  </div>

                  <div class="row scroll" id="tableDynamicUsuariosApp">
                    <div class="table-responsive col-md-12">
                      <table class="table table-bordered table-hover dataTables-example" id="tblUsuariosApp" >
                        <thead>
                          <tr>
                            <th>Nombre Completo</th>
                            <th>Usuario UNAL</th>
                            <th>Nombre Rol</th>
                            <th>Dependencia</th>
                            <th>Opciones</th>
                          </tr>
                        </thead>
                        <tbody>

                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>

              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

                <!-- Modal Usuarios -->
                <div class="modal fade" id="ModalUsuariosApp" tabindex="-1" role="dialog" aria-labelledby="ModalLabelUsuariosApp" data-bs-keyboard="false" data-bs-backdrop="static" aria-hidden="true">
                  <div class="modal-dialog modal-xl modal-fullscreen-xl-down modal-dialog-centered" >
                    <div class="modal-content">
                      <div class="modal-header iris-modal-header">
                        <h6 class="modal-title" id="ModalLabelUsuariosApp">Datos Usuario</h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                      </div>
                      <div class="modal-body">
                        <div class="container-fluid">
                            <form class="needs-validation" id="formUsuariosApp" novalidate>

                            </form>
                        </div>
                      </div>
                      <div class="modal-footer iris-modal-footer">
                        <button type="button" id="btnCloseUsuariosAppModal" class="btn-iris white small" data-bs-dismiss="modal">Cancelar</button>
                        <input type="button" value="Guardar" onclick="ValidatePostUpdateUsuariosApp('formUsuariosApp', 'btnCloseUsuariosAppModal')" class="btn-iris success small"/>
                      </div>
                    </div>
                  </div>
                </div>
                          

    <!-- Proyecto scripts -->
    <script src="../js/iris//models/usuarioModel.js"></script>
    <script src="../JS/iris/seguridad/usuario.js"></script>


  </body>


</html>
