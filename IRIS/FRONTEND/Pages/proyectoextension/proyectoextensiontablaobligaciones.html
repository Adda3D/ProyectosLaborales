<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
    <title>Proyectos Extensión</title>
-->

  </head>


  <body>

      <div class="row">
        <div class="row">
          <div class="col-md-6 titletab">DETALLE OBLIGACIONES PROYECTO</div>
        </div>
        <div class="row">
          <div class="form-group row mb-3">
            <span id="spanIdProyectoExtensionObligaciones" class="ocultar" ></span>
            <div class="col-md-2">
              <label class="form-label-iris" for="txtConsProyectoExtensionObligacion">Consecutivo</label>
              <input type="text" class="form-control iris" id="txtConsProyectoExtensionObligacion" disabled/>
            </div>
            <div class="col-md-2">
              <label class="form-label-iris" for="txtContratoProyectoExtensionObligacion">Contrato/Convenio</label>
              <input type="text" class="form-control iris" id="txtContratoProyectoExtensionObligacion" disabled/>
            </div>
            <div class="col-md-6">
              <label class="form-label-iris" for="txtNombreProyectoExtensionObligacion">Nombre Proyecto</label>
              <textarea class="form-control iris" id="txtNombreProyectoExtensionObligacion" rows="2" disabled></textarea>                                
            </div>
          </div>
        </div>
        <div class="row">
          <div class="col-md-6 titletab"></div>
          <div class="col-md-6 text-center">                     
            <button type="button" class="btn-iris success " onclick="VolverTablaProyectoExtensionDesdeObligaciones()">Volver Listado Proyectos</button>
            <button type="button" class="btn btn-primaryiris" onclick="CrearObligacionProyectoExtension()" data-bs-toggle="modal" data-bs-target="#ModalProyectoExtensionObligacion" data-bs-keyboard="false" data-bs-backdrop="static">Registrar Obligación</button>
          </div>
        </div>

        <div class="row scroll" id="tableProyectoExtensionObligaciones">
          <div class="table-responsive col-md-12">
            <table class="table table-bordered table-hover dataTables-example" width="100%" id="tblProyectoExtensionObligaciones" >
              <thead>
                <tr>                            
                  <th>Detalle Obligación</th>
                  <th>Estado</th>
                  <th>Opciones</th>
                </tr>
              </thead>
              <tbody>

              </tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="modal fade" id="ModalProyectoExtensionObligacion" tabindex="-1" role="dialog" aria-labelledby="ModalLabelProyectoExtensionObligacion" data-bs-keyboard="false" data-bs-backdrop="static" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-fullscreen-lg-down modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header iris-modal-header">
              <h6 class="modal-title" id="ModalLabelProyectoExtensionObligacion">Datos Obligación</h6>
              <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
              <div class="container-fluid">
                <form class="needs-validation" id="formProyectoExtensionObligacionDatos" novalidate>
                  <div class="form-group row mb-3">
                    <span id="spanProyectoExtensionIdObligacion" class="ocultar" ></span>
                    <div class="col-md-8">
                      <label class="form-label-iris" for="txtObligacionProyectoExtension">Detalle Obligación</label>
                      <input type="text" class="form-control iris" id="txtObligacionProyectoExtension" maxlength="100" placeholder="Descripción" data-span="spantxtObligacionProyectoExtension" required/>
                      <div class="invalid-feedback">
                        Detalle Obligación es un campo obligatorio
                      </div>
                      <div id="spantxtObligacionProyectoExtension" class="color-required ocultar">
                        No se acepta el ingreso de caracteres especiales
                      </div>
                    </div>                    
                    <div class="col-md-2">
                      <div class="col-md-12">
                          <label class="form-label-iris">Estado</label>
                      </div>
                      <div class="col-md-12 font-size-iris">
                          <select class="form-combo iris input-sm w-100 font-size-iris" style="width: 100%;" aria-hidden="true" id="cboEstadoObligacionProyectoExtension" required></select>    
                          <div class="invalid-feedback">
                            Estado es un campo obligatorio
                          </div>
                      </div>
                    </div>
                  </div>
                </form>
              </div>
            </div>

            <div class="modal-footer iris-modal-footer">
              <button type="button" id="btnCloseModalProyectoExtensionObligacion" class="btn-iris white small" onclick="CerrarModalProyectoExtensionObligacion()" data-bs-dismiss="modal">Cancelar</button>
              <input type="button" value="Guardar" onclick="ValidatePostUpdateProyectoExtensionObligacion('formProyectoExtensionObligacionDatos', 'btnCloseModalProyectoExtensionObligacion')" class="btn-iris success small"/>
            </div>
          </div>
        </div>

      </div>


    <!-- Proyecto scripts -->
    <script src="../../js/iris/proyectoextension/proyectoextensionobligaciones.js"></script>

  </body>


</html>
