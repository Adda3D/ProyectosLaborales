        <div class="row">
          <div class="form-group row mb-3">
            <div class="col-md-3">
              <label class="form-label-iris" for="txtAlcanceMatryoshkaEjesEstrategicos">Alcance</label>
              <input type="text" class="form-control iris" id="txtAlcanceMatryoshkaEjesEstrategicos" disabled/>
            </div>
            <div class="col-md-3">
              <label class="form-label-iris" for="txtDependenciaMatryoshkaEjesEstrategicos">Dependencia</label>
              <input type="text" class="form-control iris" id="txtDependenciaMatryoshkaEjesEstrategicos" disabled/>
            </div>
            <div class="col-md-6 text-center">                     
                <button type="button" class="btn-iris success " onclick="VolverTablaMatryoshkaDesdeEjes()">Volver Matryoshka</button>
                <button type="button" class="btn btn-primaryiris" onclick="CrearMatryoshkaEjesEstrategicos()" data-bs-toggle="modal" data-bs-target="#ModalMatryoshkaEjesEstrategicos" data-bs-keyboard="false" data-bs-backdrop="static">Agregar Eje</button>
              </div>    
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 titletab"></div>
          <div class="col-md-6 text-center">                     
            <button type="button" class="btn-iris success " onclick="VolverTablaMatryoshkaDesdeEjes()">Volver Matryoshka</button>
            <button type="button" class="btn btn-primaryiris" onclick="CrearMatryoshkaEjesEstrategicos()" data-bs-toggle="modal" data-bs-target="#ModalMatryoshkaEjesEstrategicos" data-bs-keyboard="false" data-bs-backdrop="static">Agregar Eje</button>
          </div>
        </div>
        -->

        <div class="row scroll" id="tableMatryoshkaEjesEstrategicos">
          <div class="table-responsive col-md-12">
            <table class="table table-bordered table-hover dataTables-example" width="100%" id="tblMatryoshkaEjesEstrategicos" >
              <thead>
                <tr>                                              
                  <th>Eje</th>
                  <th>Descripción</th>
                  <th>Opciones</th>
                </tr>
              </thead>
              <tbody>

              </tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="modal fade" id="ModalMatryoshkaEjesEstrategicos" tabindex="-1" role="dialog" aria-labelledby="ModalLabelMatryoshkaEjesEstrategicos" data-bs-keyboard="false" data-bs-backdrop="static" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-fullscreen-lg-down modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header iris-modal-header">
              <h6 class="modal-title" id="ModalLabelMatryoshkaEjesEstrategicos">Eje Estratégico</h6>
              <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
              <div class="container-fluid">
                <form class="needs-validation" id="formDecvie_MatryoshkaEjeEstrategicoDetalle" novalidate>

                </form>
              </div>
            </div>

            <div class="modal-footer iris-modal-footer">
              <button type="button" id="btnCloseModalMatryoshkaEjesEstrategicos" class="btn-iris white small" onclick="CerrarModalMatryoshkaEjesEstrategicos()" data-bs-dismiss="modal">Cancelar</button>
              <input type="button" value="Guardar" onclick="ValidatePostUpdateMatryoshkaEjesEstrategicosForm('formDecvie_MatryoshkaEjeEstrategicoDetalle', 'btnCloseModalMatryoshkaEjesEstrategicos')" class="btn-iris success small"/>
            </div>
          </div>
        </div>

      </div>
