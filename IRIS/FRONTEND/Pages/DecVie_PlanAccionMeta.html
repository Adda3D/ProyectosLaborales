<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
    <title>Ciudades</title>
-->


  </head>


  <body>


    <div class="wrapper wrapper-content animated fadeInRight">
      <div class="row col-md-12">
        <div class="col-md-12">
          <div class="ibox">
            <div class="ibox-content p-md">
              <div id="divDecVie_PlanAccionMetaHTML">
                <div class="container" id="dvDecVie_PlanAccionMetaTable">
                  <div class="row">
                    <div class="col-md-6 titletab">Metas</div>
                    <div class="col-md-6 text-center">                      
                      <button type="button" class="btn btn-primaryiris" onclick="CrearDecVie_PlanAccionMeta()" data-bs-toggle="modal" data-bs-target="#ModalDecVie_PlanAccionMeta" data-bs-keyboard="false" data-bs-backdrop="static">Nueva Meta</button>
                    </div>
                  </div>

                  <div class="row scroll" id="tableDynamicDecVie_PlanAccionMeta">
                    <div class="table-responsive col-md-12">
                      <table class="table table-bordered table-hover dataTables-example" id="tblDecVie_PlanAccionMeta" >
                        <thead>
                          <tr>
                            <th>Metas</th>
                            <th>Observaciones</th>
                            <th>Opciones</th>
                          </tr>
                        </thead>
                        <tbody>

                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>

              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

                <!-- Modal Documentos COntractuales -->
                <div class="modal fade" id="ModalDecVie_PlanAccionMeta" tabindex="-1" role="dialog" aria-labelledby="ModalLabelDecVie_PlanAccionMeta" data-bs-keyboard="false" data-bs-backdrop="static" aria-hidden="true">
                  <div class="modal-dialog  modal-fullscreen-sm-down modal-dialog-centered" >
                    <div class="modal-content">
                      <div class="modal-header iris-modal-header">
                        <h6 class="modal-title" id="ModalLabelDecVie_PlanAccionMeta">Nueva Meta</h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                      </div>
                      <div class="modal-body">
                        <div class="container-fluid">
                          <form class="needs-validation" id="formDecVie_PlanAccionMeta" novalidate>
                            <div class="form-group row mb-3">
                              <span id="spanIdDecVie_PlanAccionMeta" class="ocultar" ></span>
                              <span id="spanIdDependenciaPlanAccionMeta" class="ocultar" ></span>
                              <div class="col-md-6">
                                <label class="form-label-iris" for="txtCdDecViePlanAccionMeta">Metas</label>
                                <input type="text" class="form-control iris" id="txtCdDecViePlanAccionMeta" maxlength="120"placeholder="Meta" data-span="spanCdDecViePlanAccionMeta" required/>
                                <div class="invalid-feedback">
                                    Nueva Meta es un campo obligatorio
                                </div>
                                <div id="spanCdDecViePlanAccionMeta" class="color-required ocultar">
                                  No se acepta el ingreso de caracteres especiales
                                </div>
                              </div>
                            </div>
                            <div class="form-group row mb-3">
                              <div class="col-md-12">
                                <label class="form-label-iris" for="txtDecVie_PlanAccionMeta">Observaciones</label>
                                <input type="text" class="form-control iris" id="txtDecVie_PlanAccionMeta" maxlength="120" placeholder="Observaciones" data-span="spanDecVie_PlanAccionMeta" required/>
                                <div class="invalid-feedback">
                                  Observaciones es un campo obligatorio
                                </div>
                                <div id="spanDecVie_PlanAccionMeta" class="color-required ocultar">
                                  No se acepta el ingreso de caracteres especiales
                                </div>
                              </div>
                            </div>
                          </form>
                        </div>
                      </div>
                      <div class="modal-footer iris-modal-footer">
                        <button type="button" id="btnCloseDecVie_PlanAccionMetaModal" class="btn-iris white small" data-bs-dismiss="modal">Cancelar</button>
                        <input type="button" value="Guardar" onclick="ValidatePostUpdateDecVie_PlanAccionMeta('formDecVie_PlanAccionMeta', 'btnCloseDecVie_PlanAccionMetaModal')" class="btn-iris success small"/>
                      </div>
                    </div>
                  </div>
                </div>



    <!-- Proyecto scripts -->
    <script src="../JS/iris/DecVie_PlanAccionMeta.js"></script>


  </body>


</html>
