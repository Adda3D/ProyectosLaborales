<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
    <title>Ciudades</title>
-->


  </head>


  <body>


    <div class="wrapper wrapper-content animated fadeInRight">
      <div class="row col-md-12">
        <div class="col-md-12">
          <div class="ibox">
            <div class="ibox-content p-md">
              <div id="divDecVie_EstadoHTML">
                <div class="container" id="dvPersona_TipoServicioTable">
                  <div class="row">
                    <div class="col-md-6 titletab">Tipo Servicio</div>
                    <div class="col-md-6 text-center">
                    
                      <button type="button" class="btn btn-primaryiris" onclick="CrearPersona_TipoServicio()" data-bs-toggle="modal" data-bs-target="#ModalPersona_TipoServicio" data-bs-keyboard="false" data-bs-backdrop="static">Nuevo Tipo</button>
                    </div>
                  </div>

                  <div class="row scroll" id="tableDynamicPersona_TipoServicio">
                    <div class="table-responsive col-md-12">
                      <table class="table table-bordered table-hover dataTables-example" id="tblPersona_TipoServicio" >
                        <thead>
                          <tr>
                            <th>Tipo Servicio</th>                            
                            <th>Opciones</th>
                          </tr>
                        </thead>
                        <tbody>

                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>

              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

                <!-- Modal Documentos Contractuales -->
                <div class="modal fade" id="ModalPersona_TipoServicio" tabindex="-1" role="dialog" aria-labelledby="ModalLabelPersona_TipoServicio" data-bs-keyboard="false" data-bs-backdrop="static" aria-hidden="true">
                  <div class="modal-dialog  modal-fullscreen-sm-down modal-dialog-centered" >
                    <div class="modal-content">
                      <div class="modal-header iris-modal-header">
                        <h6 class="modal-title" id="ModalLabelPersona_TipoServicio">Tipo Servicio</h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                      </div>
                      <div class="modal-body">
                        <div class="container-fluid">
                          <form class="needs-validation" id="formPersona_TipoServicio" novalidate>
                            <div class="form-group row mb-3">
                              <span id="spanIdPersona_TipoServicio" class="ocultar" ></span>
                              <div class="col-md-6">
                                <label class="form-label-iris" for="txtCdPersonaTipoServicio">Nuevo Tipo</label>
                                <input type="text" class="form-control iris" id="txtCdPersonaTipoServicio" maxlength="30"placeholder="Tipo" data-span="spanCdPersonaTipoServicio" required/>
                                <div class="invalid-feedback">
                                    Nuevo Tipo es un campo obligatorio
                                </div>
                                <div id="spanCdPersonaTipoServicio" class="color-required ocultar">
                                  No se acepta el ingreso de caracteres especiales
                                </div>
                              </div>
                            </div>                            
                          </form>
                        </div>
                      </div>
                      <div class="modal-footer iris-modal-footer">
                        <button type="button" id="btnClosePersona_TipoServicioModal" class="btn-iris white small" data-bs-dismiss="modal">Cancelar</button>
                        <input type="button" value="Guardar" onclick="ValidatePostUpdatePersona_TipoServicio('formPersona_TipoServicio', 'btnClosePersona_TipoServicioModal')" class="btn-iris success small"/>
                      </div>
                    </div>
                  </div>
                </div>



    <!-- Proyecto scripts -->
    <script src="../JS/iris/Persona_TipoServicio.js"></script>


  </body>


</html>
