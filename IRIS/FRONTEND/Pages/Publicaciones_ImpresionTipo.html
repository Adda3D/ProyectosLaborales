<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
    <title>Ciudades</title>
-->


  </head>


  <body>


    <div class="wrapper wrapper-content animated fadeInRight">
      <div class="row col-md-12">
        <div class="col-md-12">
          <div class="ibox">
            <div class="ibox-content p-md">
              <div id="divPublicaciones_ImpresionTipoHTML">
                <div class="container" id="dvPublicaciones_ImpresionTipoTable">
                  <div class="row">
                    <div class="col-md-6 titletab">Tipo Impresión</div>
                    <div class="col-md-6 text-center">
                     
                      <button type="button" class="btn btn-primaryiris" onclick="CrearPublicaciones_ImpresionTipo()" data-bs-toggle="modal" data-bs-target="#ModalPublicaciones_ImpresionTipo" data-bs-keyboard="false" data-bs-backdrop="static">Nuevo Tipo</button>
                    </div>
                  </div>

                  <div class="row scroll" id="tableDynamicPublicaciones_ImpresionTipo">
                    <div class="table-responsive col-md-12">
                      <table class="table table-bordered table-hover dataTables-example" id="tblPublicaciones_ImpresionTipo" >
                        <thead>
                          <tr>
                            <th>Tipo Impresión</th>
                            <th>Observaciones</th>
                            <th>Opciones</th>
                          </tr>
                        </thead>
                        <tbody>

                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>

              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

                <!-- Modal Documentos Contractuales -->
                <div class="modal fade" id="ModalPublicaciones_ImpresionTipo" tabindex="-1" role="dialog" aria-labelledby="ModalLabelPublicaciones_ImpresionTipo" data-bs-keyboard="false" data-bs-backdrop="static" aria-hidden="true">
                  <div class="modal-dialog  modal-fullscreen-sm-down modal-dialog-centered" >
                    <div class="modal-content">
                      <div class="modal-header iris-modal-header">
                        <h6 class="modal-title" id="ModalLabelPublicaciones_ImpresionTipo">Tipo Impresión</h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                      </div>
                      <div class="modal-body">
                        <div class="container-fluid">
                          <form class="needs-validation" id="formPublicaciones_ImpresionTipo" novalidate>
                            <div class="form-group row mb-3">
                              <span id="spanIdPublicaciones_ImpresionTipo" class="ocultar" ></span>
                              <div class="col-md-6">
                                <label class="form-label-iris" for="txtCdPublicacionesImpresionTipo">Nuevo Tipo</label>
                                <input type="text" class="form-control iris" id="txtCdPublicacionesImpresionTipo" maxlength="50"placeholder="Tipo" data-span="spanCdPublicacionesImpresionTipo" required/>
                                <div class="invalid-feedback">
                                    Nuevo Tipo es un campo obligatorio
                                </div>
                                <div id="spanCdPublicacionesImpresionTipo" class="color-required ocultar">
                                  No se acepta el ingreso de caracteres especiales
                                </div>
                              </div>
                            </div>
                            <div class="form-group row mb-3">
                              <div class="col-md-12">
                                <label class="form-label-iris" for="txtPublicaciones_ImpresionTipo">Observaciones</label>
                                <input type="text" class="form-control iris" id="txtPublicaciones_ImpresionTipo" maxlength="120" placeholder="Observación" data-span="spanPublicaciones_ImpresionTipo" required/>
                                <div class="invalid-feedback">
                                    Observaciones es un campo obligatorio
                                </div>
                                <div id="spanPublicaciones_ImpresionTipo" class="color-required ocultar">
                                  No se acepta el ingreso de caracteres especiales
                                </div>
                              </div>
                            </div>
                          </form>
                        </div>
                      </div>
                      <div class="modal-footer iris-modal-footer">
                        <button type="button" id="btnClosePublicaciones_ImpresionTipoModal" class="btn-iris white small" data-bs-dismiss="modal">Cancelar</button>
                        <input type="button" value="Guardar" onclick="ValidatePostUpdatePublicaciones_ImpresionTipo('formPublicaciones_ImpresionTipo', 'btnClosePublicaciones_ImpresionTipoModal')" class="btn-iris success small"/>
                      </div>
                    </div>
                  </div>
                </div>



    <!-- Proyecto scripts -->
    <script src="../JS/iris/Publicaciones_ImpresionTipo.js"></script>


  </body>


</html>
