<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
    <title>Dependencia</title>
-->

  </head>

  <body>

    <div class="wrapper wrapper-content animated fadeInRight">
      <div class="row col-md-6 offset-md-2">
        <div class="col-md-12">
          <div class="ibox">
            <div class="ibox-content p-md">
              <div id="divDependenciaHTML">
                <div class="row" id="dvDependenciaTable">
                  <div class="row">
                    <div class="col-md-6 titletab">DEPENDENCIAS</div>
                    <div class="col-md-6 text-center">
                  
                      <button type="button" class="btn btn-primaryiris" onclick="CrearDependencia()" data-bs-toggle="modal" data-bs-target="#ModalDependencia" data-bs-keyboard="false" data-bs-backdrop="static">Nueva Dependencia</button>
                    </div>
                  </div>

                  <div class="row scroll" id="tableDynamicDependencia">
                    <div class="table-responsive col-md-12">
                      <table class="table table-bordered table-hover dataTables-example" width="100%" id="tblDependencia" >
                        <thead>
                          <tr>                                                        
                            <th>Código</th>
                            <th>Dependencia</th>
                            <th>Área Académica</th>                            
                            <th>Opciones</th>
                          </tr>
                        </thead>
                        <tbody>

                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>

              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

                <!-- Modal Dependencias -->
                <div class="modal fade" id="ModalDependencia" tabindex="-1" role="dialog" aria-labelledby="ModalLabelDependencia" data-bs-keyboard="false" data-bs-backdrop="static" aria-hidden="true">
                  <div class="modal-dialog modal-lg modal-fullscreen-lg-down modal-dialog-centered" >
                    <div class="modal-content">
                      <div class="modal-header iris-modal-header">
                        <h6 class="modal-title" id="ModalLabelDependencia">Datos Dependencia</h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                      </div>
                      <div class="modal-body">
                        <div class="container-fluid">
                          <form class="needs-validation" id="formDependencia" novalidate>
                            <div class="form-group row mb-3">
                              <span id="spanIdDependencia" class="ocultar" ></span>
                              <div class="col-md-2">
                                <label class="form-label-iris" for="txtCodigoDependencia">Código</label>
                                <input type="text" class="form-control iris" id="txtCodigoDependencia" maxlength="12" placeholder="No. Identificación" data-span="spanCodigoDependencia" required/>
                                <div class="invalid-feedback">
                                    Código es un campo obligatorio
                                </div>
                                <div id="spanCodigoDependencia" class="color-required ocultar">
                                  No se acepta el ingreso de caracteres especiales
                                </div>
                              </div>
                              <div class="col-md-4">
                                <label class="form-label-iris" for="txtNombreDependencia">Nombres</label>
                                <input type="text" class="form-control iris" id="txtNombreDependencia" maxlength="100" placeholder="Nombre Completo" data-span="spanNombreDependencia" required/>                                
                                <div class="invalid-feedback">
                                    Nombre es un campo obligatorio
                                </div>
                                <div id="spanNombreDependencia" class="color-required ocultar">
                                  No se acepta el ingreso de caracteres especiales
                                </div>
                              </div>
                                <div class="col-md-4">
                                    <div class="col-md-12">
                                        <label class="form-label-iris">Área Académica</label>
                                    </div>
                                    <div class="col-md-12 font-size-iris">
                                        <select class="cboAreaDependencia-select2 input-sm w-100" style="width: 100%;" aria-hidden="true" id="cboAreaDependencia" required></select>    
                                        <div class="invalid-feedback">
                                          Dependencia es un campo obligatorio
                                        </div>
                                    </div>
                                </div>                              
                            </div>
                            
                          </form>
                        </div>
                      </div>
                      <div class="modal-footer iris-modal-footer">
                        <button type="button" id="btnCloseModalDependencia" class="btn-iris white small" onclick="CerrarModalUpdateDependencia()" data-bs-dismiss="modal">Cancelar</button>
                        <input type="button" value="Guardar" onclick="ValidatePostUpdateDependencia('formDependencia', 'btnCloseModalDependencia')" class="btn-iris success small"/>
                      </div>
                    </div>
                  </div>
                </div>



    <!-- Proyecto scripts -->
    <script src="../js/iris/dependencia.js"></script>

  </body>


</html>
