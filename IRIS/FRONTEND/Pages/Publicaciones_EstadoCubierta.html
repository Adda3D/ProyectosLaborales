<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
    <title>Ciudades</title>
-->


  </head>


  <body>


    <div class="wrapper wrapper-content animated fadeInRight">
      <div class="row col-md-12">
        <div class="col-md-12">
          <div class="ibox">
            <div class="ibox-content p-md">
              <div id="divPublicaciones_EstadoCubiertaHTML">
                <div class="container" id="dvPublicaciones_EstadoCubiertaTable">
                  <div class="row">
                    <div class="col-md-6 titletab">Estado Cubierta</div>
                    <div class="col-md-6 text-center">                      
                      <button type="button" class="btn btn-primaryiris" onclick="CrearPublicaciones_EstadoCubierta()" data-bs-toggle="modal" data-bs-target="#ModalPublicaciones_EstadoCubierta" data-bs-keyboard="false" data-bs-backdrop="static">Nuevo Estado</button>
                    </div>
                  </div>

                  <div class="row scroll" id="tableDynamicPublicaciones_EstadoCubierta">
                    <div class="table-responsive col-md-12">
                      <table class="table table-bordered table-hover dataTables-example" id="tblPublicaciones_EstadoCubierta" >
                        <thead>
                          <tr>
                            <th>Estado Cubierta</th>                            
                            <th>Opciones</th>
                          </tr>
                        </thead>
                        <tbody>

                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>

              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

                <!-- Modal Documentos Contractuales -->
                <div class="modal fade" id="ModalPublicaciones_EstadoCubierta" tabindex="-1" role="dialog" aria-labelledby="ModalLabelPublicaciones_EstadoCubierta" data-bs-keyboard="false" data-bs-backdrop="static" aria-hidden="true">
                  <div class="modal-dialog  modal-fullscreen-sm-down modal-dialog-centered" >
                    <div class="modal-content">
                      <div class="modal-header iris-modal-header">
                        <h6 class="modal-title" id="ModalLabelPublicaciones_EstadoCubierta">Estado Cubierta</h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                      </div>
                      <div class="modal-body">
                        <div class="container-fluid">
                          <form class="needs-validation" id="formPublicaciones_EstadoCubierta" novalidate>
                            <div class="form-group row mb-3">
                              <span id="spanIdPublicaciones_EstadoCubierta" class="ocultar" ></span>
                              <div class="col-md-6">
                                <label class="form-label-iris" for="txtCdPublicacionesEstadoCubierta">Nuevo Estado</label>
                                <input type="text" class="form-control iris" id="txtCdPublicacionesEstadoCubierta" maxlength="50"placeholder="Estado" data-span="spanCdPublicacionesEstadoCubierta" required/>
                                <div class="invalid-feedback">
                                    Nuevo Estado es un campo obligatorio
                                </div>
                                <div id="spanCdPublicacionesEstadoCubierta" class="color-required ocultar">
                                  No se acepta el ingreso de caracteres especiales
                                </div>
                              </div>
                            </div>                            
                          </form>
                        </div>
                      </div>
                      <div class="modal-footer iris-modal-footer">
                        <button type="button" id="btnClosePublicaciones_EstadoCubiertaModal" class="btn-iris white small" data-bs-dismiss="modal">Cancelar</button>
                        <input type="button" value="Guardar" onclick="ValidatePostUpdatePublicaciones_EstadoCubierta('formPublicaciones_EstadoCubierta', 'btnClosePublicaciones_EstadoCubiertaModal')" class="btn-iris success small"/>
                      </div>
                    </div>
                  </div>
                </div>



    <!-- Proyecto scripts -->
    <script src="../JS/iris/Publicaciones_EstadoCubierta.js"></script>


  </body>


</html>
