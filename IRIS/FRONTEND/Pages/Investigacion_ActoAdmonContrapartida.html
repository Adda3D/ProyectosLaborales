<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
    <title>Ciudades</title>
-->


  </head>


  <body>


    <div class="wrapper wrapper-content animated fadeInRight">
      <div class="row col-md-12">
        <div class="col-md-12">
          <div class="ibox">
            <div class="ibox-content p-md">
              <div id="divInvestigacion_ActoAdmonContrapartidaHTML">
                <div class="container" id="dvInvestigacion_ActoAdmonContrapartidaTable">
                  <div class="row">
                    <div class="col-md-6 titletab">Acto Administrativo</div>
                    <div class="col-md-6 text-center">
                 
                      <button type="button" class="btn btn-primaryiris" onclick="CrearInvestigacion_ActoAdmonContrapartida()" data-bs-toggle="modal" data-bs-target="#ModalInvestigacion_ActoAdmonContrapartida" data-bs-keyboard="false" data-bs-backdrop="static">Nuevo Acto</button>
                    </div>
                  </div>

                  <div class="row scroll" id="tableDynamicInvestigacion_ActoAdmonContrapartida">
                    <div class="table-responsive col-md-12">
                      <table class="table table-bordered table-hover dataTables-example" id="tblInvestigacion_ActoAdmonContrapartida" >
                        <thead>
                          <tr>
                            <th>Codigo Hermes</th>
                            <th>Acto Administrativo</th>
                            <th>Opciones</th>
                          </tr>
                        </thead>
                        <tbody>

                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>

              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

                <!-- Modal Documentos Contractuales -->
                <div class="modal fade" id="ModalInvestigacion_ActoAdmonContrapartida" tabindex="-1" role="dialog" aria-labelledby="ModalLabelInvestigacion_ActoAdmonContrapartida" data-bs-keyboard="false" data-bs-backdrop="static" aria-hidden="true">
                  <div class="modal-dialog  modal-fullscreen-sm-down modal-dialog-centered" >
                    <div class="modal-content">
                      <div class="modal-header iris-modal-header">
                        <h6 class="modal-title" id="ModalLabelInvestigacion_ActoAdmonContrapartida">Acto Administrativo</h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                      </div>
                      <div class="modal-body">
                        <div class="container-fluid">
                          <form class="needs-validation" id="formInvestigacion_ActoAdmonContrapartida" novalidate>
                            <div class="form-group row mb-3">
                              <span id="spanIdInvestigacion_ActoAdmonContrapartida" class="ocultar" ></span>
                              <div class="col-md-6">
                                <label class="form-label-iris" for="txtCdInvestigacionActoAdmonContrapartida">Código Hermes</label>
                                <input type="text" class="form-control iris" id="txtCdInvestigacionActoAdmonContrapartida" maxlength="50"placeholder="Código" data-span="spanCdInvestigacionActoAdmonContrapartida" required/>
                                <div class="invalid-feedback">
                                    Código Hermes es un campo obligatorio
                                </div>
                                <div id="spanCdInvestigacionActoAdmonContrapartida" class="color-required ocultar">
                                  No se acepta el ingreso de caracteres especiales
                                </div>
                              </div>
                            </div>
                            <div class="form-group row mb-3">
                              <div class="col-md-12">
                                <label class="form-label-iris" for="txtInvestigacion_ActoAdmonContrapartida">Acto Administrativo</label>
                                <input type="text" class="form-control iris" id="txtInvestigacion_ActoAdmonContrapartida" maxlength="120" placeholder="Acto" data-span="spanInvestigacion_ActoAdmonContrapartida" required/>
                                <div class="invalid-feedback">
                                    Acto Administrativo es un campo obligatorio
                                </div>
                                <div id="spanInvestigacion_ActoAdmonContrapartida" class="color-required ocultar">
                                  No se acepta el ingreso de caracteres especiales
                                </div>
                              </div>
                            </div>
                          </form>
                        </div>
                      </div>
                      <div class="modal-footer iris-modal-footer">
                        <button type="button" id="btnCloseInvestigacion_ActoAdmonContrapartidaModal" class="btn-iris white small" data-bs-dismiss="modal">Cancelar</button>
                        <input type="button" value="Guardar" onclick="ValidatePostUpdateInvestigacion_ActoAdmonContrapartida('formInvestigacion_ActoAdmonContrapartida', 'btnCloseInvestigacion_ActoAdmonContrapartidaModal')" class="btn-iris success small"/>
                      </div>
                    </div>
                  </div>
                </div>



    <!-- Proyecto scripts -->
    <script src="../JS/iris/Investigacion_ActoAdmonContrapartida.js"></script>


  </body>


</html>
