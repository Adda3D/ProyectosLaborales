<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
    <title>Ciudades</title>
-->


  </head>


  <body>


    <div class="wrapper wrapper-content animated fadeInRight">
      <div class="row col-md-12">
        <div class="col-md-12">
          <div class="ibox">
            <div class="ibox-content p-md">
              <div id="divDecVie_RevSigepHTML">
                <div class="container" id="dvDecVie_RevSigepTable">
                  <div class="row">
                    <div class="col-md-6 titletab">Revisión SIGEP</div>
                    <div class="col-md-6 text-center">
                  
                      <button type="button" class="btn btn-primaryiris" onclick="CrearDecVie_RevSigep()" data-bs-toggle="modal" data-bs-target="#ModalDecVie_RevSigep" data-bs-keyboard="false" data-bs-backdrop="static">Nueva Revisión</button>
                    </div>
                  </div>

                  <div class="row scroll" id="tableDynamicDecVie_RevSigep">
                    <div class="table-responsive col-md-12">
                      <table class="table table-bordered table-hover dataTables-example" id="tblDecVie_RevSigep" >
                        <thead>
                          <tr>
                            <th>Revisión SIGEP</th>
                            <th>Observaciones</th>
                            <th>Opciones</th>
                          </tr>
                        </thead>
                        <tbody>

                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>

              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

                <!-- Modal Documentos COntractuales -->
                <div class="modal fade" id="ModalDecVie_RevSigep" tabindex="-1" role="dialog" aria-labelledby="ModalLabelDecVie_RevSigep" data-bs-keyboard="false" data-bs-backdrop="static" aria-hidden="true">
                  <div class="modal-dialog  modal-fullscreen-sm-down modal-dialog-centered" >
                    <div class="modal-content">
                      <div class="modal-header iris-modal-header">
                        <h6 class="modal-title" id="ModalLabelDecVie_RevSigep">Revisión SIGEP</h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                      </div>
                      <div class="modal-body">
                        <div class="container-fluid">
                          <form class="needs-validation" id="formDecVie_RevSigep" novalidate>
                            <div class="form-group row mb-3">
                              <span id="spanIdDecVie_RevSigep" class="ocultar" ></span>
                              <div class="col-md-6">
                                <label class="form-label-iris" for="txtCdDecVieRevSigep">Revisión SIGEP</label>
                                <input type="text" class="form-control iris" id="txtCdDecVieRevSigep" maxlength="10"placeholder="Revisión SIGEP" data-span="spanCdDecVieRevSigep" required/>
                                <div class="invalid-feedback">
                                    Revisión SIGEP es un campo obligatorio
                                </div>
                                <div id="spanCdDecVieRevSigep" class="color-required ocultar">
                                  No se acepta el ingreso de caracteres especiales
                                </div>
                              </div>
                            </div>
                            <div class="form-group row mb-3">
                              <div class="col-md-12">
                                <label class="form-label-iris" for="txtDecVie_RevSigep">Observaciones</label>
                                <input type="text" class="form-control iris" id="txtDecVie_RevSigep" maxlength="120" placeholder="Observaciones" data-span="spanDecVie_RevSigep" required/>
                                <div class="invalid-feedback">
                                  Observaciones es un campo obligatorio
                                </div>
                                <div id="spanDecVie_RevSigep" class="color-required ocultar">
                                  No se acepta el ingreso de caracteres especiales
                                </div>
                              </div>
                            </div>
                          </form>
                        </div>
                      </div>
                      <div class="modal-footer iris-modal-footer">
                        <button type="button" id="btnCloseDecVie_RevSigepModal" class="btn-iris white small" data-bs-dismiss="modal">Cancelar</button>
                        <input type="button" value="Guardar" onclick="ValidatePostUpdateDecVie_RevSigep('formDecVie_RevSigep', 'btnCloseDecVie_RevSigepModal')" class="btn-iris success small"/>
                      </div>
                    </div>
                  </div>
                </div>



    <!-- Proyecto scripts -->
    <script src="../JS/iris/DecVie_RevSigep.js"></script>


  </body>


</html>
