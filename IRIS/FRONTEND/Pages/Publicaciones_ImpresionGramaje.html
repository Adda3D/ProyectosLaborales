<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
    <title>Ciudades</title>
-->


  </head>


  <body>


    <div class="wrapper wrapper-content animated fadeInRight">
      <div class="row col-md-12">
        <div class="col-md-12">
          <div class="ibox">
            <div class="ibox-content p-md">
              <div id="divPublicaciones_ImpresionGramajeHTML">
                <div class="container" id="dvPublicaciones_ImpresionGramajeTable">
                  <div class="row">
                    <div class="col-md-6 titletab">Gramajes</div>
                    <div class="col-md-6 text-center">
            
                      <button type="button" class="btn btn-primaryiris" onclick="CrearPublicaciones_ImpresionGramaje()" data-bs-toggle="modal" data-bs-target="#ModalPublicaciones_ImpresionGramaje" data-bs-keyboard="false" data-bs-backdrop="static">Nuevo Gramaje</button>
                    </div>
                  </div>

                  <div class="row scroll" id="tableDynamicPublicaciones_ImpresionGramaje">
                    <div class="table-responsive col-md-12">
                      <table class="table table-bordered table-hover dataTables-example" id="tblPublicaciones_ImpresionGramaje" >
                        <thead>
                          <tr>
                            <th>Gramajes</th>
                            <th>Observaciones</th>
                            <th>Opciones</th>
                          </tr>
                        </thead>
                        <tbody>

                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>

              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

                <!-- Modal Documentos Contractuales -->
                <div class="modal fade" id="ModalPublicaciones_ImpresionGramaje" tabindex="-1" role="dialog" aria-labelledby="ModalLabelPublicaciones_ImpresionGramaje" data-bs-keyboard="false" data-bs-backdrop="static" aria-hidden="true">
                  <div class="modal-dialog  modal-fullscreen-sm-down modal-dialog-centered" >
                    <div class="modal-content">
                      <div class="modal-header iris-modal-header">
                        <h6 class="modal-title" id="ModalLabelPublicaciones_ImpresionGramaje">Gramajes</h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                      </div>
                      <div class="modal-body">
                        <div class="container-fluid">
                          <form class="needs-validation" id="formPublicaciones_ImpresionGramaje" novalidate>
                            <div class="form-group row mb-3">
                              <span id="spanIdPublicaciones_ImpresionGramaje" class="ocultar" ></span>
                              <div class="col-md-6">
                                <label class="form-label-iris" for="txtCdPublicacionesImpresionGramaje">Nuevo Gramaje</label>
                                <input type="text" class="form-control iris" id="txtCdPublicacionesImpresionGramaje" maxlength="50"placeholder="Gramaje" data-span="spanCdPublicacionesImpresionGramaje" required/>
                                <div class="invalid-feedback">
                                    Nuevo Gramaje es un campo obligatorio
                                </div>
                                <div id="spanCdPublicacionesImpresionGramaje" class="color-required ocultar">
                                  No se acepta el ingreso de caracteres especiales
                                </div>
                              </div>
                            </div>
                            <div class="form-group row mb-3">
                              <div class="col-md-12">
                                <label class="form-label-iris" for="txtPublicaciones_ImpresionGramaje">Observaciones</label>
                                <input type="text" class="form-control iris" id="txtPublicaciones_ImpresionGramaje" maxlength="120" placeholder="Observación" data-span="spanPublicaciones_ImpresionGramaje" required/>
                                <div class="invalid-feedback">
                                    Observaciones es un campo obligatorio
                                </div>
                                <div id="spanPublicaciones_ImpresionGramaje" class="color-required ocultar">
                                  No se acepta el ingreso de caracteres especiales
                                </div>
                              </div>
                            </div>
                          </form>
                        </div>
                      </div>
                      <div class="modal-footer iris-modal-footer">
                        <button type="button" id="btnClosePublicaciones_ImpresionGramajeModal" class="btn-iris white small" data-bs-dismiss="modal">Cancelar</button>
                        <input type="button" value="Guardar" onclick="ValidatePostUpdatePublicaciones_ImpresionGramaje('formPublicaciones_ImpresionGramaje', 'btnClosePublicaciones_ImpresionGramajeModal')" class="btn-iris success small"/>
                      </div>
                    </div>
                  </div>
                </div>



    <!-- Proyecto scripts -->
    <script src="../JS/iris/Publicaciones_ImpresionGramaje.js"></script>


  </body>


</html>
