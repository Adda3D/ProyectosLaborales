<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
    <title>Ciudades</title>
-->


  </head>


  <body>


    <div class="wrapper wrapper-content animated fadeInRight">
      <div class="row col-md-12">
        <div class="col-md-12">
          <div class="ibox">
            <div class="ibox-content p-md">
              <div id="divPublicaciones_CostosServicioEditorialHTML">
                <div class="container" id="dvPublicaciones_CostosServicioEditorialTable">
                  <div class="row">
                    <div class="col-md-6 titletab">Servicio Editorial</div>
                    <div class="col-md-6 text-center">                      
                      <button type="button" class="btn btn-primaryiris" onclick="CrearPublicaciones_CostosServicioEditorial()" data-bs-toggle="modal" data-bs-target="#ModalPublicaciones_CostosServicioEditorial" data-bs-keyboard="false" data-bs-backdrop="static">Nuevo Servicio</button>
                    </div>
                  </div>

                  <div class="row scroll" id="tableDynamicPublicaciones_CostosServicioEditorial">
                    <div class="table-responsive col-md-12">
                      <table class="table table-bordered table-hover dataTables-example" id="tblPublicaciones_CostosServicioEditorial" >
                        <thead>
                          <tr>
                            <th>Servicio Editorial</th>                            
                            <th>Opciones</th>
                          </tr>
                        </thead>
                        <tbody>

                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>

              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

                <!-- Modal Documentos Contractuales -->
                <div class="modal fade" id="ModalPublicaciones_CostosServicioEditorial" tabindex="-1" role="dialog" aria-labelledby="ModalLabelPublicaciones_CostosServicioEditorial" data-bs-keyboard="false" data-bs-backdrop="static" aria-hidden="true">
                  <div class="modal-dialog  modal-fullscreen-sm-down modal-dialog-centered" >
                    <div class="modal-content">
                      <div class="modal-header iris-modal-header">
                        <h6 class="modal-title" id="ModalLabelPublicaciones_CostosServicioEditorial">Servicio Editorial</h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                      </div>
                      <div class="modal-body">
                        <div class="container-fluid">
                          <form class="needs-validation" id="formPublicaciones_CostosServicioEditorial" novalidate>
                            <div class="form-group row mb-3">
                              <span id="spanIdPublicaciones_CostosServicioEditorial" class="ocultar" ></span>
                              <div class="col-md-6">
                                <label class="form-label-iris" for="txtCdPublicacionesCostosServicioEditorial">Nuevo Servicio</label>
                                <input type="text" class="form-control iris" id="txtCdPublicacionesCostosServicioEditorial" maxlength="30"placeholder="Servicio" data-span="spanCdPublicacionesCostosServicioEditorial" required/>
                                <div class="invalid-feedback">
                                    Nuevo Servicio es un campo obligatorio
                                </div>
                                <div id="spanCdPublicacionesCostosServicioEditorial" class="color-required ocultar">
                                  No se acepta el ingreso de caracteres especiales
                                </div>
                              </div>
                            </div>                            
                          </form>
                        </div>
                      </div>
                      <div class="modal-footer iris-modal-footer">
                        <button type="button" id="btnClosePublicaciones_CostosServicioEditorialModal" class="btn-iris white small" data-bs-dismiss="modal">Cancelar</button>
                        <input type="button" value="Guardar" onclick="ValidatePostUpdatePublicaciones_CostosServicioEditorial('formPublicaciones_CostosServicioEditorial', 'btnClosePublicaciones_CostosServicioEditorialModal')" class="btn-iris success small"/>
                      </div>
                    </div>
                  </div>
                </div>



    <!-- Proyecto scripts -->
    <script src="../JS/iris/Publicaciones_CostosServicioEditorial.js"></script>


  </body>


</html>
