<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
    <title>Ciudades</title>
-->


  </head>


  <body>


    <div class="wrapper wrapper-content animated fadeInRight">
      <div class="row col-md-12">
        <div class="col-md-12">
          <div class="ibox">
            <div class="ibox-content p-md">
              <div id="divDecVie_ColegiadosHTML">
                <div class="container" id="dvDecVie_ColegiadosTable">
                  <div class="row">
                    <div class="col-md-6 titletab">COLEGIADOS</div>
                    <div class="col-md-6 text-center">
                   
                      <button type="button" class="btn btn-primaryiris" onclick="CrearDecVie_Colegiados()" data-bs-toggle="modal" data-bs-target="#ModalDecVie_Colegiados" data-bs-keyboard="false" data-bs-backdrop="static">Nuevo Colegiado</button>
                    </div>
                  </div>

                  <div class="row scroll" id="tableDynamicDecVie_Colegiados">
                    <div class="table-responsive col-md-12">
                      <table class="table table-bordered table-hover dataTables-example" id="tblDecVie_Colegiados" >
                        <thead>
                          <tr>
                            <th>Colegiado</th>
                            <th>Observaciones</th>
                            <th>Opciones</th>
                          </tr>
                        </thead>
                        <tbody>

                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>

              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

                <!-- Modal Tipología -->
                <div class="modal fade" id="ModalDecVie_Colegiados" tabindex="-1" role="dialog" aria-labelledby="ModalLabelDecVie_Colegiados" data-bs-keyboard="false" data-bs-backdrop="static" aria-hidden="true">
                  <div class="modal-dialog  modal-fullscreen-sm-down modal-dialog-centered" >
                    <div class="modal-content">
                      <div class="modal-header iris-modal-header">
                        <h6 class="modal-title" id="ModalLabelDecVie_Colegiados">COLEGIADOS</h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                      </div>
                      <div class="modal-body">
                        <div class="container-fluid">
                          <form class="needs-validation" id="formDecVie_Colegiados" novalidate>
                            <div class="form-group row mb-3">
                              <span id="spanIdDecVie_Colegiados" class="ocultar" ></span>
                              <div class="col-md-6">
                                <label class="form-label-iris" for="txNombreDecVie_Colegiados">Nombre Colegiado</label>
                                <input type="text" class="form-control iris" id="txNombreDecVie_Colegiados" maxlength="255"placeholder="Nombre Colegiado" data-span="spantxNombreDecVie_Colegiados" required/>
                                <div class="invalid-feedback">
                                  Nombre Colegiado es un campo obligatorio
                                </div>
                                <div id="spantxNombreDecVie_Colegiados" class="color-required ocultar">
                                  No se acepta el ingreso de caracteres especiales
                                </div>
                              </div>
                            </div>
                            <div class="form-group row mb-3">
                              <div class="col-md-12">
                                <label class="form-label-iris" for="txtObservacionesDecVie_Colegiados">Observaciones</label>
                                <input type="text" class="form-control iris" id="txtObservacionesDecVie_Colegiados" maxlength="120" placeholder="Observaciones" data-span="spantxtObservacionesDecVie_Colegiados"/>                                
                                <div id="spantxtObservacionesDecVie_Colegiados" class="color-required ocultar">
                                  No se acepta el ingreso de caracteres especiales
                                </div>
                              </div>
                            </div>
                          </form>
                        </div>
                      </div>
                      <div class="modal-footer iris-modal-footer">
                        <button type="button" id="btnCloseDecVie_ColegiadosModal" class="btn-iris white small" data-bs-dismiss="modal">Cancelar</button>
                        <input type="button" value="Guardar" onclick="ValidatePostUpdateDecVie_Colegiados('formDecVie_Colegiados', 'btnCloseDecVie_ColegiadosModal')" class="btn-iris success small"/>
                      </div>
                    </div>
                  </div>
                </div>



    <!-- Proyecto scripts -->
    <script src="../JS/iris/DecVie_Colegiados.js"></script>


  </body>


</html>
