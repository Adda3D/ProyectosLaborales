<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Expires" content="0" />
    <meta http-equiv="Last-Modified" content="0" />
    <meta http-equiv="Cache-Control" content="no-cache, mustrevalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
  </head>
  <body>

    <div class="wrapper wrapper-content animated fadeInRight">
      <div class="row col-md-12">
        <div class="col-md-12">
          <div class="ibox">
            <div class="ibox-content p-md">

              <h2 class="text-center" style="margin-bottom: 24px;">
                Investigación por Resolución y Literal
              </h2>

              <!-- Filtros -->
              <div class="row" style="margin-bottom: 32px;">
                <div class="col-md-6">
                  <label for="ugi-resolucion" class="form-label-iris" style="font-size: 15px; font-weight: 600; display:block; margin-bottom: 6px;">
                    Selecciona una Resolución:
                  </label>
                  <select id="ugi-resolucion" class="form-control iris" onchange="ugiDash.onFiltroChange()">
                    <option value="">Seleccione una Resolución</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label for="ugi-literal" class="form-label-iris" style="font-size: 15px; font-weight: 600; display:block; margin-bottom: 6px;">
                    Selecciona un Literal:
                  </label>
                  <select id="ugi-literal" class="form-control iris" onchange="ugiDash.onFiltroChange()">
                    <option value="">Seleccione un Literal</option>
                  </select>
                </div>
              </div>

              <!-- Gráficos lado a lado -->
              <div class="row">
                <div class="col-md-6">
                  <figure>
                    <div id="ugi-torta"></div>
                    <p style="text-align: center; color: #666; font-size: 13px; margin-top: 8px;">
                      Gráfico de Torta: Distribución del Total Literal por Concepto.
                    </p>
                  </figure>
                </div>
                <div class="col-md-6">
                  <figure>
                    <div id="ugi-barras"></div>
                    <p style="text-align: center; color: #666; font-size: 13px; margin-top: 8px;">
                      Gráfico de Barras Apiladas: Total Pagado y Asignado por Concepto.
                    </p>
                  </figure>
                </div>
              </div>

              <!-- Tarjetas de resumen (debajo de los gráficos) -->
              <div id="ugi-cards" style="margin-top: 24px;"></div>

            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/apexcharts@3.49.0/dist/apexcharts.min.js"></script>
    <script src="../../js/iris/Investigacion/investigacion_ugi_apexcharts.js"></script>
  </body>
</html>
