              <label class="form-label-iris" for="txtTituloConvocatoria_RecursoParticipante">Titulo Convocatoria</label>

              <input type="text" class="form-control iris" id="txtDependenciaConvocatoria_RecursoParticipante" disabled/>
            </div> -->
            <div class="col-md-6 text-center">                     
                <button type="button" class="btn-iris success " onclick="VolverTablaConvocatoria_RecursoParticipanteDesdeRecursos()">Volver Convocatorias</button>
                <button type="button" class="btn btn-primaryiris" onclick="CrearConvocatoria_RecursoParticipante()" data-bs-toggle="modal" data-bs-target="#ModalConvocatoria_RecursoParticipante" data-bs-keyboard="false" data-bs-backdrop="static">Agregar Recurso</button>
              </div>    
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 titletab"></div>
          <div class="col-md-6 text-center">                     
            <button type="button" class="btn-iris success " onclick="VolverTablaMatryoshkaDesdeEjes()">Volver Matryoshka</button>
            <button type="button" class="btn btn-primaryiris" onclick="CrearMatryoshkaEjesEstrategicos()" data-bs-toggle="modal" data-bs-target="#ModalMatryoshkaEjesEstrategicos" data-bs-keyboard="false" data-bs-backdrop="static">Agregar Eje</button>
          </div>
        </div>
        -->

        <div class="row scroll" id="tableConvocatoria_RecursoParticipante">
          <div class="table-responsive col-md-12">
            <table class="table table-bordered table-hover dataTables-example" width="100%" id="tblConvocatoria_RecursoParticipante" >
              <thead>
                <tr>                                              
                  <th>Recurso</th>
                  <th>Valor Recurso</th>
                  <th>Opciones</th>
                </tr>
              </thead>
              <tbody>

              </tbody>
            </table>
          </div>
        </div>

      <div class="modal fade" id="ModalConvocatoria_RecursoParticipante" tabindex="-1" role="dialog" aria-labelledby="ModalLabelConvocatoria_RecursoParticipante" data-bs-keyboard="false" data-bs-backdrop="static" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-fullscreen-lg-down modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header iris-modal-header">
              <h6 class="modal-title" id="ModalLabelConvocatoria_RecursoParticipante">Recurso por Participante</h6>
              <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
              <div class="container-fluid">
                <form class="needs-validation" id="formConvocatoria_RecursoParticipanteDetalle" novalidate>

                </form>
              </div>
            </div>

            <div class="modal-footer iris-modal-footer">
              <button type="button" id="btnCloseModalModalLabelConvocatoria_RecursoParticipante" class="btn-iris white small" onclick="CerrarConvocatoria_RecursoParticipante()" data-bs-dismiss="modal">Cancelar</button>
              <input type="button" value="Guardar" onclick="ValidatePostUpdateConvocatoria_RecursoParticipanteForm('formConvocatoria_RecursoParticipanteDetalle', 'btnCloseModalModalLabelConvocatoria_RecursoParticipante')" class="btn-iris success small"/>
            </div>
          </div>
        </div>

      </div>


    <!-- Proyecto scripts -->
