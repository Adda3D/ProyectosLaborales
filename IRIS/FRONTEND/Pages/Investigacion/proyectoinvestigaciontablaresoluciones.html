<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
    <title>GESTION OBLIGACIONES PROYECTO INVESTIGACION</title>
-->

  </head>

  <body>

    <div class="row">
        <div class="row">
          <div class="col-md-6 titletab">RESOLUCIONES DEL PROYECTO</div>
        </div>  
        <div class="row">
          <div class="form-group row mb-2">
            <div class="col-md-2">
              <label class="form-label-iris" for="txtHermesPRJINVResoluciones">Hermes ID</label>
              <input type="text" class="form-control iris" id="txtHermesPRJINVResoluciones" disabled/>
          </div>
          <div class="col-md-2">
              <label class="form-label-iris" for="txtQuipuPRJINVResoluciones">Quipu</label>
              <input type="text" class="form-control iris" id="txtQuipuPRJINVResoluciones" disabled/>
          </div>
          <div class="col-md-4">
              <label class="form-label-iris" for="txtNombrePRJINVResoluciones">Nombre Proyecto</label>
              <textarea class="form-control iris" id="txtNombrePRJINVResoluciones" rows="2" disabled></textarea>
          </div>
          
            <div class="col-md-4 text-center">                     
                <button type="button" class="btn-iris success " onclick="VolverTablaProyectoInvestigacionDesdeResolucionesForm()">Volver Listado Proyectos</button>
                <button type="button" class="btn btn-primaryiris" onclick="CrearProyectoInvestigacionResoluciones1()" data-bs-toggle="modal" data-bs-target="#ModalProyectoInvestigacionResoluciones" data-bs-keyboard="false" data-bs-backdrop="static">Nueva Resolución</button>
            </div>    
          </div>
        </div>

        <div class="row scroll" id="tableProyectoInvestigacionResoluciones">
          <div class="table-responsive col-md-12">
            <table class="table table-bordered table-hover dataTables-example" width="100%" id="tblProyectoInvestigacionResoluciones" >
              <thead>
                <tr> 
                    <th>Resolución</th>
                    <th>Valor</th>                    
                    <th>Opciones</th>
                </tr>
              </thead>
              <tbody>

              </tbody>
            </table>
          </div>
        </div>
    </div>


                <!-- Modal Obligación -->
                <div class="modal fade" id="ModalProyectoInvestigacionResoluciones" tabindex="-1" role="dialog" aria-labelledby="ModalLabelProyectoInvestigacionResoluciones" data-bs-keyboard="false" data-bs-backdrop="static" aria-hidden="true">
                    <div class="modal-dialog modal-lg modal-fullscreen-lg-down modal-dialog-centered" >
                      <div class="modal-content">
                        <div class="modal-header iris-modal-header">
                          <h6 class="modal-title" id="ModalLabelProyectoInvestigacionResoluciones">Datos Resoluciones</h6>
                          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                          <div class="container-fluid">
                              <form class="needs-validation" id="formProyectoInvestigacionResoluciones" novalidate>
  
                              </form>
                          </div>
                        </div>
                        <div class="modal-footer iris-modal-footer">
                          <button type="button" id="btnCloseProyectoInvestigacionResolucionesModal" onclick="CerrarProyectoInvestigacionResolucionesDesdeEdicion()" class="btn-iris white small" data-bs-dismiss="modal">Cancelar</button>
                          <input type="button" value="Guardar" onclick="ValidatePostUpdateProyectoInvestigacionResolucionesForm('formProyectoInvestigacionResoluciones', 'btnCloseProyectoInvestigacionResolucionesModal')" class="btn-iris success small"/>
                        </div>
                      </div>
                    </div>
                </div>
  
  


    <!-- Proyecto scripts -->
    <script src="../../js/iris/models/investigacion/Investigacion_Resolucion.js" ></script>
    <script src="../../js/iris/Investigacion/proyectoinvestigaciontablaresoluciones.js"></script>

  </body>


</html>
