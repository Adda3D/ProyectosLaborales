<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
    <title>Ciudades</title>
-->


  </head>


  <body>


    <div class="wrapper wrapper-content animated fadeInRight">
      <div class="row col-md-12">
        <div class="col-md-12">
          <div class="ibox">
            <div class="ibox-content p-md">
              <div id="divDecVieTipologiaHTML">
                <div class="container" id="dvDecVieTipologiaTable">
                  <div class="row">
                    <div class="col-md-6 titletab">TIPOLOGÍA</div>
                    <div class="col-md-6 text-center">
                  
                      <button type="button" class="btn btn-primaryiris" onclick="CrearDecVieTipologia()" data-bs-toggle="modal" data-bs-target="#ModalDecVie_Tipologia" data-bs-keyboard="false" data-bs-backdrop="static">Nueva Tipología</button>
                    </div>
                  </div>

                  <div class="row scroll" id="tableDynamicDecVieTipologia">
                    <div class="table-responsive col-md-12">
                      <table class="table table-bordered table-hover dataTables-example" id="tblDecVieTipologia" >
                        <thead>
                          <tr>
                            <th>Tipología</th>
                            <th>Observaciones</th>
                            <th>Opciones</th>
                          </tr>
                        </thead>
                        <tbody>

                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>

              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

                <!-- Modal Tipología -->
                <div class="modal fade" id="ModalDecVie_Tipologia" tabindex="-1" role="dialog" aria-labelledby="ModalLabelDecVie_Tipologia" data-bs-keyboard="false" data-bs-backdrop="static" aria-hidden="true">
                  <div class="modal-dialog  modal-fullscreen-sm-down modal-dialog-centered" >
                    <div class="modal-content">
                      <div class="modal-header iris-modal-header">
                        <h6 class="modal-title" id="ModalLabelDecVie_Tipologia">Tipología</h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                      </div>
                      <div class="modal-body">
                        <div class="container-fluid">
                          <form class="needs-validation" id="formDecVie_Tipologia" novalidate>
                            <div class="form-group row mb-3">
                              <span id="spanIdDecVie_Tipologia" class="ocultar" ></span>
                              <div class="col-md-6">
                                <label class="form-label-iris" for="txtCdDecVieTipologia">Nombre Tipología</label>
                                <input type="text" class="form-control iris" id="txtCdDecVieTipologia" maxlength="255"placeholder="Nombre Tipología" data-span="spanCdDecVieTipologia" required/>
                                <div class="invalid-feedback">
                                  Nombre Tipología es un campo obligatorio
                                </div>
                                <div id="spanCdDecVieTipologia" class="color-required ocultar">
                                  No se acepta el ingreso de caracteres especiales
                                </div>
                              </div>
                            </div>
                            <div class="form-group row mb-3">
                              <div class="col-md-12">
                                <label class="form-label-iris" for="txtDecVie_Tipologia">Observaciones</label>
                                <input type="text" class="form-control iris" id="txtDecVie_Tipologia" maxlength="300" placeholder="Observaciones" data-span="spanDecVie_Tipologia" required/>
                                <div class="invalid-feedback">
                                  Observaciones es un campo obligatorio
                                </div>
                                <div id="spanDecVie_Tipologia" class="color-required ocultar">
                                  No se acepta el ingreso de caracteres especiales
                                </div>
                              </div>
                            </div>
                          </form>
                        </div>
                      </div>
                      <div class="modal-footer iris-modal-footer">
                        <button type="button" id="btnCloseDecVie_TipologiaModal" class="btn-iris white small" data-bs-dismiss="modal">Cancelar</button>
                        <input type="button" value="Guardar" onclick="ValidatePostUpdateDecVie_Tipologia('formDecVie_Tipologia', 'btnCloseDecVie_TipologiaModal')" class="btn-iris success small"/>
                      </div>
                    </div>
                  </div>
                </div>



    <!-- Proyecto scripts -->
    <script src="../JS/iris/decvietipologia.js"></script>


  </body>


</html>
